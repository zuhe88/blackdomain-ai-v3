<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>世足 12碼點球</title>
  <style>
    :root {
      --bg: #060708;
      --panel: rgba(12, 15, 18, .86);
      --panel-2: rgba(22, 26, 29, .76);
      --line: rgba(255, 255, 255, .13);
      --gold: #d8b764;
      --green: #31d47b;
      --red: #ff5d5d;
      --blue: #68d8ff;
      --text: #f7f8fa;
      --muted: #9fa8b4;
      --shadow: 0 24px 70px rgba(0, 0, 0, .45);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif; }
    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% -20%, rgba(216,183,100,.20), transparent 32%),
        radial-gradient(circle at 12% 20%, rgba(104,216,255,.12), transparent 24%),
        linear-gradient(180deg, #060708 0%, #0d1210 48%, #061008 100%);
    }

    .pitch-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background:
        linear-gradient(90deg, transparent 49.8%, rgba(255,255,255,.16) 50%, transparent 50.2%),
        linear-gradient(0deg, transparent 14%, rgba(255,255,255,.10) 14.15%, transparent 14.35%),
        linear-gradient(0deg, transparent 84%, rgba(255,255,255,.10) 84.15%, transparent 84.35%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 1px, transparent 1px 86px);
    }

    .app {
      width: min(440px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 26px;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: .14em;
      font-weight: 700;
    }

    h1 {
      margin: 3px 0 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: .04em;
    }

    .scoreboard {
      flex: 0 0 auto;
      min-width: 112px;
      padding: 10px 12px;
      border: 1px solid rgba(216,183,100,.42);
      border-radius: 18px;
      background: rgba(0,0,0,.36);
      text-align: center;
      box-shadow: 0 0 26px rgba(216,183,100,.08);
    }

    .score-label { color: var(--muted); font-size: 11px; }
    .score-value { font-size: 24px; font-weight: 800; letter-spacing: .12em; }

    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-card { padding: 16px; margin-bottom: 12px; }

    .selector-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .country {
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 16px;
      background: rgba(255,255,255,.055);
      color: var(--text);
      min-height: 62px;
      padding: 8px 6px;
      display: grid;
      place-items: center;
      gap: 3px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .country.active {
      border-color: rgba(216,183,100,.9);
      background: linear-gradient(180deg, rgba(216,183,100,.22), rgba(255,255,255,.05));
      transform: translateY(-1px);
    }

    .flag { font-size: 25px; }
    .country-name { font-size: 12px; font-weight: 700; }

    .player-strip {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(216,183,100,.16), rgba(104,216,255,.07));
      border: 1px solid rgba(216,183,100,.28);
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.45), transparent 22%),
        linear-gradient(135deg, #d8b764, #5e4116);
      color: #101010;
      box-shadow: 0 8px 22px rgba(216,183,100,.22);
    }

    .player-name { font-size: 18px; font-weight: 800; }
    .player-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.4; }

    .stadium {
      position: relative;
      margin: 12px 0;
      height: min(58vh, 520px);
      min-height: 440px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.18), transparent 26%),
        linear-gradient(180deg, rgba(7,10,14,.98) 0 16%, rgba(9,49,31,.96) 16% 100%);
    }

    .crowd {
      position: absolute;
      inset: 0 0 auto;
      height: 90px;
      background:
        radial-gradient(circle, rgba(216,183,100,.82) 0 1.5px, transparent 2px) 0 0 / 18px 13px,
        radial-gradient(circle, rgba(104,216,255,.55) 0 1.5px, transparent 2px) 6px 5px / 22px 14px;
      opacity: .7;
      mask-image: linear-gradient(180deg, #000 0%, transparent 100%);
    }

    .ad-ribbon {
      position: absolute;
      left: 0;
      right: 0;
      top: 72px;
      height: 34px;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.16);
      border-bottom: 1px solid rgba(216,183,100,.42);
      background:
        linear-gradient(180deg, rgba(7,11,13,.96), rgba(0,0,0,.84)),
        repeating-linear-gradient(90deg, rgba(216,183,100,.12) 0 1px, transparent 1px 8px);
      box-shadow: 0 8px 22px rgba(0,0,0,.34), 0 0 24px rgba(216,183,100,.12);
      z-index: 2;
    }

    .ad-track {
      display: flex;
      align-items: center;
      width: max-content;
      height: 100%;
      animation: marquee 18s linear infinite;
      white-space: nowrap;
    }

    .ad-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      color: #fff7dc;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-shadow: 0 0 10px rgba(216,183,100,.38);
    }

    .ad-item img {
      width: 78px;
      max-height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(42,205,216,.45));
      background: rgba(255,255,255,.92);
      border-radius: 7px;
      padding: 2px 5px;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .side-ads {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 252px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      z-index: 1;
    }

    .sideline-board {
      width: 120px;
      min-height: 52px;
      padding: 6px 8px;
      border: 1px solid rgba(216,183,100,.54);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(0,0,0,.78), rgba(12,18,16,.72));
      box-shadow: inset 0 0 14px rgba(216,183,100,.08), 0 10px 20px rgba(0,0,0,.3);
      transform: perspective(220px) rotateX(9deg);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .sideline-board img {
      width: 92px;
      background: rgba(255,255,255,.94);
      border-radius: 6px;
      padding: 2px 5px;
      margin-bottom: 3px;
    }

    .sideline-board span {
      color: #ffe6a0;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.25;
    }

    .goal {
      position: absolute;
      left: 50%;
      top: 84px;
      width: 78%;
      height: 158px;
      transform: translateX(-50%);
      border: 5px solid rgba(255,255,255,.88);
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.14) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(0deg, rgba(255,255,255,.14) 1px, transparent 1px) 0 0 / 28px 28px;
      box-shadow: 0 0 38px rgba(255,255,255,.16), inset 0 0 28px rgba(255,255,255,.08);
    }

    .keeper {
      position: absolute;
      top: 155px;
      left: 50%;
      width: 68px;
      height: 92px;
      transform: translateX(-50%);
      transition: transform .42s cubic-bezier(.2,.8,.2,1);
      z-index: 3;
    }

    .keeper::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f1c29b;
    }

    .keeper::after {
      content: "";
      position: absolute;
      left: 14px;
      top: 31px;
      width: 42px;
      height: 46px;
      border-radius: 15px 15px 8px 8px;
      background: linear-gradient(135deg, #53e08c, #08723c);
      box-shadow:
        -24px 6px 0 -8px #53e08c,
        24px 6px 0 -8px #53e08c,
        -12px 46px 0 -10px #16191d,
        12px 46px 0 -10px #16191d;
    }

    .keeper.left { transform: translateX(-162%) rotate(-18deg); }
    .keeper.right { transform: translateX(62%) rotate(18deg); }
    .keeper.center { transform: translateX(-50%) scale(1.04); }

    .penalty-dot {
      position: absolute;
      left: 50%;
      bottom: 98px;
      width: 10px;
      height: 10px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(255,255,255,.9);
    }

    .ball {
      position: absolute;
      left: 50%;
      bottom: 78px;
      width: 36px;
      height: 36px;
      transform: translate(-50%, 0);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #fff 0 12px, transparent 13px),
        conic-gradient(from 20deg, #fff, #111 0 18%, #fff 0 35%, #111 0 48%, #fff 0 100%);
      box-shadow: 0 11px 24px rgba(0,0,0,.5);
      transition: transform .62s cubic-bezier(.18,.84,.24,1.02), opacity .3s;
      z-index: 4;
    }

    .striker {
      position: absolute;
      left: 50%;
      bottom: 22px;
      width: 64px;
      height: 100px;
      transform: translateX(-50%);
      transition: transform .28s ease;
      z-index: 2;
    }

    .striker::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #bd805e;
    }

    .striker::after {
      content: "";
      position: absolute;
      left: 12px;
      top: 31px;
      width: 42px;
      height: 48px;
      border-radius: 15px 15px 10px 10px;
      background: var(--kit, linear-gradient(135deg, #fff, #ddd));
      box-shadow: -10px 48px 0 -9px #f7f7f7, 12px 48px 0 -9px #f7f7f7;
    }

    .striker.kick { transform: translateX(-50%) translateY(-8px) rotate(-4deg); }

    .target-grid {
      position: absolute;
      left: 50%;
      top: 86px;
      width: 78%;
      height: 158px;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      z-index: 5;
    }

    .target {
      border: 0;
      background: transparent;
      color: transparent;
      cursor: pointer;
    }

    .target:hover { background: rgba(216,183,100,.12); }

    .result-banner {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 136px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(0,0,0,.56);
      border: 1px solid rgba(255,255,255,.16);
      text-align: center;
      font-weight: 800;
      min-height: 50px;
      display: grid;
      place-items: center;
      z-index: 8;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .shot-btn, .secondary-btn {
      border: 1px solid rgba(216,183,100,.42);
      background: linear-gradient(180deg, rgba(216,183,100,.18), rgba(255,255,255,.05));
      color: var(--text);
      min-height: 48px;
      border-radius: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    .shot-btn:disabled, .secondary-btn:disabled { opacity: .55; cursor: wait; }
    .shot-btn:active, .secondary-btn:active { transform: translateY(1px); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      padding: 10px 8px;
      border-radius: 16px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.1);
      text-align: center;
    }

    .stat span { display: block; color: var(--muted); font-size: 11px; }
    .stat strong { display: block; margin-top: 3px; font-size: 18px; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .secondary-btn {
      min-height: 44px;
      background: rgba(255,255,255,.055);
      border-color: rgba(255,255,255,.16);
    }

    .history {
      padding: 14px;
      margin-top: 12px;
    }

    .history h2 {
      margin: 0 0 9px;
      font-size: 15px;
      color: var(--gold);
    }

    .log {
      display: grid;
      gap: 7px;
      max-height: 124px;
      overflow: auto;
      padding-right: 2px;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.055);
      color: var(--muted);
      font-size: 12px;
    }

    .log-item b { color: var(--text); }

    @media (max-width: 370px) {
      h1 { font-size: 24px; }
      .stadium { min-height: 405px; }
      .country-grid { grid-template-columns: repeat(2, 1fr); }
      .sideline-board { width: 104px; }
      .ad-item { font-size: 12px; padding: 0 18px; }
    }
  </style>
</head>
<body>
  <div class="pitch-lines"></div>
  <main class="app">
    <section class="topbar">
      <div class="brand">
        <div class="eyebrow">WORLD FOOTBALL</div>
        <h1>世足 12碼點球</h1>
      </div>
      <div class="scoreboard">
        <div class="score-label">五球決勝</div>
        <div class="score-value"><span id="scoreUs">0</span> : <span id="scoreCpu">0</span></div>
      </div>
    </section>

    <section class="card hero-card">
      <div class="selector-title">
        <span>選擇國家名將</span>
        <span id="roundText">第 1 球</span>
      </div>
      <div class="country-grid" id="countryGrid"></div>
      <div class="player-strip">
        <div class="avatar" id="avatar">梅</div>
        <div>
          <div class="player-name" id="playerName">梅西</div>
          <div class="player-meta" id="playerMeta">阿根廷名將｜左腳精準、冷靜推射</div>
        </div>
      </div>
    </section>

    <section class="card stadium" id="stadium">
      <div class="crowd"></div>
      <div class="ad-ribbon" aria-label="球場廣告看板">
        <div class="ad-track">
          <span class="ad-item"><img src="./assets/3a-logo.png" alt="3A娛樂城">首儲1000送1000　LINE:@893jrweh</span>
          <span class="ad-item"><img src="./assets/3a-logo.png" alt="3A娛樂城">世足場邊合作看板　3A娛樂城</span>
          <span class="ad-item"><img src="./assets/3a-logo.png" alt="3A娛樂城">首儲1000送1000　LINE:@893jrweh</span>
          <span class="ad-item"><img src="./assets/3a-logo.png" alt="3A娛樂城">世足場邊合作看板　3A娛樂城</span>
        </div>
      </div>
      <div class="goal"></div>
      <div class="side-ads" aria-hidden="true">
        <div class="sideline-board">
          <img src="./assets/3a-logo.png" alt="">
          <span>首儲1000<br>送1000</span>
        </div>
        <div class="sideline-board">
          <img src="./assets/3a-logo.png" alt="">
          <span>LINE<br>@893jrweh</span>
        </div>
      </div>
      <div class="keeper" id="keeper"></div>
      <div class="target-grid" id="targetGrid" aria-label="射門方向">
        <button class="target" data-zone="left" aria-label="射向左邊">左</button>
        <button class="target" data-zone="center" aria-label="射向中路">中</button>
        <button class="target" data-zone="right" aria-label="射向右邊">右</button>
      </div>
      <div class="penalty-dot"></div>
      <div class="ball" id="ball"></div>
      <div class="striker" id="striker"></div>
      <div class="result-banner" id="resultText">選好名將，點擊射門方向。</div>
    </section>

    <section class="controls">
      <button class="shot-btn" data-shot="left">左上角</button>
      <button class="shot-btn" data-shot="center">中路</button>
      <button class="shot-btn" data-shot="right">右下角</button>
    </section>

    <section class="stats">
      <div class="stat"><span>射門</span><strong id="shots">0</strong></div>
      <div class="stat"><span>進球</span><strong id="goals">0</strong></div>
      <div class="stat"><span>撲救</span><strong id="saves">0</strong></div>
      <div class="stat"><span>連勝</span><strong id="streak">0</strong></div>
    </section>

    <section class="actions">
      <button class="secondary-btn" id="resetBtn">重新開始</button>
      <button class="secondary-btn" id="randomBtn">隨機名將</button>
    </section>

    <section class="card history">
      <h2>射門紀錄</h2>
      <div class="log" id="log"></div>
    </section>
  </main>

  <script>
    const players = [
      { country: "阿根廷", flag: "🇦🇷", name: "梅西", initials: "梅", meta: "左腳精準、冷靜推射", kit: "linear-gradient(135deg,#8fd5ff 0 45%,#fff 45% 58%,#8fd5ff 58%)", power: 82 },
      { country: "法國", flag: "🇫🇷", name: "姆巴佩", initials: "姆", meta: "爆發速度、右腳重砲", kit: "linear-gradient(135deg,#163aa8,#e63535)", power: 86 },
      { country: "葡萄牙", flag: "🇵🇹", name: "C羅", initials: "羅", meta: "強力抽射、心理素質", kit: "linear-gradient(135deg,#c92323 0 55%,#0c8a4a 55%)", power: 88 },
      { country: "巴西", flag: "🇧🇷", name: "內馬爾", initials: "內", meta: "節奏變化、刁鑽角度", kit: "linear-gradient(135deg,#ffe34f,#24a35a)", power: 84 },
      { country: "英格蘭", flag: "🏴", name: "凱恩", initials: "凱", meta: "穩定助跑、低角度射門", kit: "linear-gradient(135deg,#ffffff,#d8d8d8)", power: 85 },
      { country: "西班牙", flag: "🇪🇸", name: "莫拉塔", initials: "莫", meta: "禁區嗅覺、節奏停頓", kit: "linear-gradient(135deg,#d71920,#f6c343)", power: 78 }
    ];

    const zones = ["left", "center", "right"];
    const zoneText = { left: "左路", center: "中路", right: "右路" };
    const ballTarget = {
      left: "translate(-190px, -270px) scale(.72)",
      center: "translate(-50%, -286px) scale(.72)",
      right: "translate(154px, -270px) scale(.72)"
    };

    const state = {
      player: players[0],
      shot: 0,
      goals: 0,
      cpu: 0,
      saves: 0,
      streak: Number(localStorage.getItem("penalty_streak") || 0),
      locked: false,
      log: []
    };

    const $ = (id) => document.getElementById(id);
    const countryGrid = $("countryGrid");

    function keeperPick() {
      const bias = Math.random();
      if (bias < .35) return "left";
      if (bias < .68) return "right";
      return "center";
    }

    function renderCountries() {
      countryGrid.innerHTML = "";
      players.forEach((player, index) => {
        const button = document.createElement("button");
        button.className = "country" + (player.country === state.player.country ? " active" : "");
        button.innerHTML = `<div class="flag">${player.flag}</div><div class="country-name">${player.country}</div>`;
        button.addEventListener("click", () => selectPlayer(index));
        countryGrid.appendChild(button);
      });
    }

    function selectPlayer(index) {
      if (state.locked) return;
      state.player = players[index];
      $("avatar").textContent = state.player.initials;
      $("playerName").textContent = state.player.name;
      $("playerMeta").textContent = `${state.player.country}名將｜${state.player.meta}`;
      $("striker").style.setProperty("--kit", state.player.kit);
      renderCountries();
    }

    function updateUi() {
      $("scoreUs").textContent = state.goals;
      $("scoreCpu").textContent = state.cpu;
      $("shots").textContent = state.shot;
      $("goals").textContent = state.goals;
      $("saves").textContent = state.saves;
      $("streak").textContent = state.streak;
      $("roundText").textContent = state.shot >= 5 ? "PK 結束" : `第 ${state.shot + 1} 球`;
      document.querySelectorAll(".shot-btn").forEach((button) => button.disabled = state.locked || state.shot >= 5);
      $("log").innerHTML = state.log.length
        ? state.log.map((item) => `<div class="log-item"><span>${item.left}</span><b>${item.right}</b></div>`).join("")
        : `<div class="log-item"><span>尚未射門</span><b>等待開始</b></div>`;
    }

    function resetBall() {
      $("ball").style.opacity = "1";
      $("ball").style.transform = "translate(-50%, 0)";
      $("keeper").className = "keeper";
      $("striker").className = "striker";
    }

    function finishMatch() {
      const won = state.goals > state.cpu;
      const tied = state.goals === state.cpu;
      if (won) state.streak += 1;
      if (!won) state.streak = 0;
      localStorage.setItem("penalty_streak", String(state.streak));
      $("resultText").innerHTML = tied ? "平手收場，再來一輪。" : won ? "你贏下點球大戰！" : "守門員笑到了最後。";
    }

    function shoot(zone) {
      if (state.locked || state.shot >= 5) return;
      state.locked = true;
      updateUi();
      resetBall();

      const keeper = keeperPick();
      const quality = state.player.power + Math.floor(Math.random() * 16) - 8;
      const onTarget = quality >= 74 || zone === "center";
      const saved = onTarget && keeper === zone && Math.random() > .22;
      const goal = onTarget && !saved;
      const cpuGoal = Math.random() > .38;

      requestAnimationFrame(() => {
        $("striker").classList.add("kick");
        $("keeper").classList.add(keeper);
        $("ball").style.transform = ballTarget[zone];
      });

      setTimeout(() => {
        state.shot += 1;
        if (goal) state.goals += 1;
        if (cpuGoal) state.cpu += 1;
        if (saved) state.saves += 1;

        const title = goal ? "漂亮進球" : saved ? "被守門員撲出" : "射門偏出";
        const keeperLine = `你射${zoneText[zone]}，門將撲${zoneText[keeper]}`;
        $("resultText").innerHTML = `${title}<br><small>${state.player.name}｜${keeperLine}</small>`;
        state.log.unshift({
          left: `第 ${state.shot} 球・${state.player.country}`,
          right: goal ? "進球" : "未進"
        });

        if (state.shot >= 5) finishMatch();
        state.locked = false;
        updateUi();
      }, 720);
    }

    function resetGame() {
      state.shot = 0;
      state.goals = 0;
      state.cpu = 0;
      state.saves = 0;
      state.locked = false;
      state.log = [];
      resetBall();
      $("resultText").textContent = "選好名將，點擊射門方向。";
      updateUi();
    }

    document.querySelectorAll("[data-shot], [data-zone]").forEach((button) => {
      button.addEventListener("click", () => shoot(button.dataset.shot || button.dataset.zone));
    });
    $("resetBtn").addEventListener("click", resetGame);
    $("randomBtn").addEventListener("click", () => selectPlayer(Math.floor(Math.random() * players.length)));

    selectPlayer(0);
    updateUi();
  </script>
</body>
</html>
