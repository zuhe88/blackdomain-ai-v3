<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>世足點球大戰</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06100b;
      color: #fff;
      font-family: "Microsoft JhengHei", "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .score {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      min-width: 230px;
      padding: 10px 18px 12px;
      border-radius: 18px;
      background: rgba(4, 8, 10, .62);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 48px rgba(0,0,0,.35);
      text-align: center;
    }

    .score small {
      display: block;
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .18em;
    }

    .score strong {
      display: block;
      margin-top: 2px;
      font-size: 34px;
      letter-spacing: .14em;
      line-height: 1;
    }

    .player-card {
      position: absolute;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(18px, env(safe-area-inset-bottom));
      width: min(340px, calc(100vw - 32px));
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: rgba(4, 8, 10, .70);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 48px rgba(0,0,0,.35);
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .03em;
      background: linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.18);
    }

    .player-card small {
      display: block;
      color: rgba(255,255,255,.66);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
    }

    .player-card strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      line-height: 1.2;
    }

    .country-dock {
      pointer-events: auto;
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(4, 8, 10, .52);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 48px rgba(0,0,0,.28);
    }

    .country-dock button,
    .controls button {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
      font-family: inherit;
    }

    .country-dock button {
      min-width: 78px;
      height: 40px;
      padding: 0 14px;
      font-size: 14px;
      letter-spacing: .04em;
    }

    .country-dock button.active {
      background: linear-gradient(135deg, rgba(0,163,255,.45), rgba(255,255,255,.12));
      border-color: rgba(92, 204, 255, .7);
      box-shadow: 0 0 26px rgba(0,163,255,.25);
    }

    .controls {
      pointer-events: auto;
      position: absolute;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      display: grid;
      gap: 8px;
      width: min(300px, calc(100vw - 32px));
      padding: 12px;
      border-radius: 20px;
      background: rgba(4, 8, 10, .68);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 48px rgba(0,0,0,.35);
    }

    .shot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .controls button {
      min-height: 44px;
      font-size: 14px;
    }

    .controls button:hover,
    .country-dock button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
    }

    .controls button:disabled {
      opacity: .48;
      cursor: not-allowed;
      transform: none;
    }

    .wide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .result {
      position: absolute;
      left: 50%;
      top: 17%;
      transform: translateX(-50%);
      width: min(430px, calc(100vw - 28px));
      padding: 16px;
      border-radius: 22px;
      background: rgba(4, 8, 10, .68);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,.36);
      text-align: center;
      opacity: 0;
      translate: 0 -10px;
      transition: opacity .25s ease, translate .25s ease;
    }

    .result.show {
      opacity: 1;
      translate: 0 0;
    }

    .result strong {
      display: block;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .result span {
      color: rgba(255,255,255,.78);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .hint {
      position: absolute;
      top: calc(max(14px, env(safe-area-inset-top)) + 78px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.76);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(0,0,0,.36);
      border: 1px solid rgba(255,255,255,.12);
    }

    @media (max-width: 860px) {
      .score {
        top: max(8px, env(safe-area-inset-top));
        min-width: 186px;
        padding: 8px 13px 9px;
        border-radius: 15px;
      }

      .score small {
        font-size: 10px;
        letter-spacing: .12em;
      }

      .hint {
        top: calc(max(8px, env(safe-area-inset-top)) + 62px);
        width: max-content;
        max-width: calc(100vw - 28px);
        font-size: 11px;
        white-space: nowrap;
      }

      .player-card {
        top: calc(max(8px, env(safe-area-inset-top)) + 96px);
        bottom: auto;
        left: max(10px, env(safe-area-inset-left));
        width: min(270px, calc(100vw - 20px));
        grid-template-columns: 48px 1fr;
        gap: 9px;
        padding: 9px;
        border-radius: 16px;
      }

      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        font-size: 13px;
      }

      .player-card small {
        font-size: 10px;
      }

      .player-card strong {
        font-size: 15px;
      }

      .country-dock {
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: calc(max(14px, env(safe-area-inset-bottom)) + 106px);
        transform: none;
        overflow-x: auto;
        scrollbar-width: none;
        justify-content: flex-start;
        border-radius: 18px;
        padding: 7px;
      }

      .country-dock::-webkit-scrollbar {
        display: none;
      }

      .country-dock button {
        min-width: 70px;
        height: 34px;
        padding: 0 10px;
        font-size: 12px;
        flex: 0 0 auto;
      }

      .controls {
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
        width: auto;
        padding: 9px;
        border-radius: 18px;
      }

      .controls button {
        min-height: 38px;
        font-size: 12px;
      }

      .shot-grid,
      .wide {
        gap: 7px;
      }

      .score strong { font-size: 24px; }
      .result {
        top: 35%;
        width: min(330px, calc(100vw - 24px));
        padding: 13px;
      }

      .result strong {
        font-size: 22px;
      }
    }

    @media (max-width: 430px) and (max-height: 760px) {
      .player-card {
        top: calc(max(8px, env(safe-area-inset-top)) + 86px);
      }

      .country-dock {
        bottom: calc(max(10px, env(safe-area-inset-bottom)) + 96px);
      }

      .controls button {
        min-height: 34px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score">
      <small>世足點球大戰</small>
      <strong id="scoreText">進 0｜未進 0</strong>
    </div>

    <div class="hint" id="hintText">選擇射門方向開始挑戰</div>

    <div class="result" id="resultBox">
      <strong id="resultTitle">準備射門</strong>
      <span id="resultText">選擇方向後開始 12 碼。</span>
    </div>

    <div class="player-card">
      <div class="avatar" id="flagBox">阿根廷</div>
      <div>
        <small>本輪對戰</small>
        <strong id="playerName">阿根廷名將</strong>
      </div>
    </div>

    <div class="country-dock" id="countryDock"></div>

    <div class="controls">
      <div class="shot-grid">
        <button data-shot="left">左上角</button>
        <button data-shot="center">中路</button>
        <button data-shot="right">右上角</button>
      </div>
      <div class="wide">
        <button id="nextBtn">下一位名將</button>
        <button id="resetBtn">重新開始</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const canvas = document.getElementById("game");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.75));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7db5e8);
    scene.fog = new THREE.Fog(0x7db5e8, 38, 135);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, .1, 220);
    camera.position.set(0, 4.7, 18.5);
    camera.lookAt(0, 1.4, -23);

    const clock = new THREE.Clock();
    const PLAYER_MODEL_URL = "https://threejs.org/examples/models/gltf/Xbot.glb";
    const modelMixers = [];
    let usingExternalModels = false;

    const players = [
      { country: "阿根廷", name: "梅西", kit: 0x82c9ff, shorts: 0xffffff, skin: 0xc58a63 },
      { country: "巴西", name: "內馬爾", kit: 0xf6dc32, shorts: 0x1f5faa, skin: 0x9a613f },
      { country: "法國", name: "姆巴佩", kit: 0x173d8f, shorts: 0xffffff, skin: 0x8a5a43 },
      { country: "葡萄牙", name: "C羅", kit: 0xc51d2d, shorts: 0x174c2a, skin: 0xb8754d },
      { country: "西班牙", name: "莫拉塔", kit: 0xd7252c, shorts: 0x142b7c, skin: 0xc98a63 },
      { country: "日本", name: "三笘薰", kit: 0x2450aa, shorts: 0xffffff, skin: 0xd0a06f },
      { country: "挪威", name: "哈蘭德", kit: 0xd61f2f, shorts: 0x173d8f, skin: 0xd1a074 }
    ];

    const state = {
      playerIndex: 0,
      goals: 0,
      misses: 0,
      shots: 0,
      locked: false,
      anim: null,
      resultTimer: null,
      autoResetTimer: null
    };

    const $ = (id) => document.getElementById(id);
    const buttons = [...document.querySelectorAll("button")];

    const mat = {
      grass: new THREE.MeshStandardMaterial({ color: 0x248b3a, roughness: .9 }),
      grassDark: new THREE.MeshStandardMaterial({ color: 0x1f7b32, roughness: .95 }),
      line: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .5 }),
      post: new THREE.MeshStandardMaterial({ color: 0xf4f7ff, roughness: .42, metalness: .08 }),
      net: new THREE.LineBasicMaterial({ color: 0xe8f2ff, transparent: true, opacity: .62 }),
      black: new THREE.MeshStandardMaterial({ color: 0x050505, roughness: .6 }),
      ball: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .48 }),
      ballDark: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: .5 })
    };

    scene.add(new THREE.HemisphereLight(0xd9eeff, 0x276334, 1.7));
    const sun = new THREE.DirectionalLight(0xffffff, 2.7);
    sun.position.set(-13, 20, 18);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -32;
    sun.shadow.camera.right = 32;
    sun.shadow.camera.top = 32;
    sun.shadow.camera.bottom = -32;
    scene.add(sun);

    function addBox(size, position, material, parent = scene, cast = true, receive = true) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), material);
      mesh.position.set(position[0], position[1], position[2]);
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      parent.add(mesh);
      return mesh;
    }

    function addCylinder(radius, depth, position, material, parent = scene, rotation = [0, 0, 0]) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, depth, 24), material);
      mesh.position.set(position[0], position[1], position[2]);
      mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      parent.add(mesh);
      return mesh;
    }

    function buildPitch() {
      addBox([42, .08, 96], [0, -.05, -23], mat.grass, scene, false, true);
      for (let i = 0; i < 12; i += 1) {
        const z = 22 - i * 8;
        addBox([42, .09, 4], [0, -.03, z], i % 2 ? mat.grassDark : mat.grass, scene, false, true);
      }
      addBox([18.4, .05, .08], [0, .02, -33.2], mat.line, scene, false, true);
      addBox([.08, .05, 12.5], [-9.2, .02, -27], mat.line, scene, false, true);
      addBox([.08, .05, 12.5], [9.2, .02, -27], mat.line, scene, false, true);
      addBox([18.4, .05, .08], [0, .02, -20.8], mat.line, scene, false, true);
      addBox([7.5, .05, .08], [0, .025, -33.2], mat.line, scene, false, true);
      addBox([.08, .05, 5.2], [-3.75, .025, -30.6], mat.line, scene, false, true);
      addBox([.08, .05, 5.2], [3.75, .025, -30.6], mat.line, scene, false, true);
      addBox([7.5, .05, .08], [0, .025, -28], mat.line, scene, false, true);
      addCylinder(.12, .04, [0, .06, 0], mat.line, scene);

    }

    function makeBoardTexture(text) {
      const c = document.createElement("canvas");
      c.width = 1600;
      c.height = 360;
      const ctx = c.getContext("2d");
      const texture = new THREE.CanvasTexture(c);
      texture.colorSpace = THREE.SRGBColorSpace;
      const draw = () => {
        const g = ctx.createLinearGradient(0, 0, c.width, 0);
        g.addColorStop(0, "#071214");
        g.addColorStop(.5, "#111111");
        g.addColorStop(1, "#09202a");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = "rgba(0, 225, 255, .12)";
        ctx.fillRect(0, 0, c.width, 42);
        ctx.fillRect(0, c.height - 42, c.width, 42);
        ctx.strokeStyle = "rgba(19, 202, 220, .92)";
        ctx.lineWidth = 12;
        ctx.strokeRect(16, 16, c.width - 32, c.height - 32);
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 116px Microsoft JhengHei, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(text, c.width / 2, 142);
        ctx.fillStyle = "#ffe18a";
        ctx.font = "900 64px Microsoft JhengHei, sans-serif";
        ctx.fillText("首儲1000送1000", c.width / 2, 224);
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 48px Microsoft JhengHei, sans-serif";
        ctx.fillText("LINE:@893jrweh", c.width / 2, 292);
        texture.needsUpdate = true;
      };
      draw();
      return texture;
    }

    function buildStadium() {
      const seatMat = new THREE.MeshStandardMaterial({ color: 0x345e91, roughness: .72 });
      const stairMat = new THREE.MeshStandardMaterial({ color: 0xb7c4d7, roughness: .7 });
      for (let row = 0; row < 13; row += 1) {
        const y = 1.1 + row * .42;
        const z = -41.5 - row * .9;
        for (let col = -22; col <= 22; col += 2) {
          const seat = addBox([1.1, .18, .44], [col, y, z], seatMat, scene, false, true);
          seat.rotation.x = -.08;
        }
        if (row % 3 === 0) {
          addBox([.35, .14, 36], [-12, y + .02, z], stairMat, scene, false, true);
          addBox([.35, .14, 36], [12, y + .02, z], stairMat, scene, false, true);
        }
      }
      addBox([52, 5.2, .5], [0, 2.8, -52.5], new THREE.MeshStandardMaterial({ color: 0x8898a8, roughness: .8 }), scene, false, true);

      const boardTex = makeBoardTexture("3A娛樂城");
      const boardMat = new THREE.MeshBasicMaterial({ map: boardTex });
      const mainBoard = addBox([24, 4.2, .24], [0, 5.25, -36.2], boardMat, scene, false, false);
      mainBoard.rotation.x = -.04;

      for (const x of [-21.8, 21.8]) {
        const sideBoard = addBox([13.8, 2.4, .24], [x, 1.55, -27.0], boardMat, scene, false, false);
        sideBoard.rotation.y = x < 0 ? .52 : -.52;
      }
    }

    const goal = new THREE.Group();
    scene.add(goal);
    function buildGoal() {
      const postW = .16;
      addBox([postW, 3.3, postW], [-3.65, 1.65, -31], mat.post, goal);
      addBox([postW, 3.3, postW], [3.65, 1.65, -31], mat.post, goal);
      addBox([7.45, postW, postW], [0, 3.3, -31], mat.post, goal);
      addBox([postW, 3.05, postW], [-3.65, 1.52, -34.3], mat.post, goal);
      addBox([postW, 3.05, postW], [3.65, 1.52, -34.3], mat.post, goal);
      addBox([7.45, postW, postW], [0, 3.05, -34.3], mat.post, goal);

      const netGroup = new THREE.Group();
      goal.add(netGroup);
      const addLine = (a, b) => {
        const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a), new THREE.Vector3(...b)]);
        netGroup.add(new THREE.Line(geo, mat.net));
      };
      for (let x = -3.6; x <= 3.61; x += .45) addLine([x, .08, -31], [x, 3.1, -34.2]);
      for (let y = .25; y <= 3.1; y += .38) addLine([-3.6, y, -31], [3.6, y, -31]);
      for (let y = .25; y <= 3.0; y += .38) addLine([-3.6, y, -34.2], [3.6, y, -34.2]);
      for (let z = -31; z >= -34.25; z -= .42) addLine([-3.6, .1, z], [3.6, .1, z]);
      goal.userData.net = netGroup;
    }

    let striker;
    let keeper;
    let ball;
    const trail = [];

    function buildPlayerModel(options) {
      const group = new THREE.Group();
      const kitMat = new THREE.MeshStandardMaterial({ color: options.kit, roughness: .55, metalness: .02 });
      const shortsMat = new THREE.MeshStandardMaterial({ color: options.shorts, roughness: .58 });
      const skinMat = new THREE.MeshStandardMaterial({ color: options.skin, roughness: .62 });
      const sockMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: .6 });
      const bootMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: .45 });
      const sleeveMat = options.role === "keeper" ? kitMat : skinMat;
      const gloveMat = new THREE.MeshStandardMaterial({ color: 0xf4f7ff, roughness: .38, metalness: .02 });
      const trimMat = new THREE.MeshStandardMaterial({ color: 0x9ee8ff, roughness: .42, metalness: .06 });

      const parts = {};
      parts.body = addBox([.72, 1.15, .38], [0, 1.75, 0], kitMat, group);
      parts.head = new THREE.Mesh(new THREE.SphereGeometry(.26, 24, 18), skinMat);
      parts.head.position.set(0, 2.48, 0);
      parts.head.castShadow = true;
      group.add(parts.head);

      const hairMat = new THREE.MeshStandardMaterial({ color: 0x17110d, roughness: .72 });
      parts.hair = new THREE.Mesh(new THREE.SphereGeometry(.272, 24, 12, 0, Math.PI * 2, 0, Math.PI * .58), hairMat);
      parts.hair.position.set(0, 2.57, -.02);
      parts.hair.castShadow = true;
      group.add(parts.hair);

      const eyeMat = new THREE.MeshBasicMaterial({ color: 0x101820 });
      parts.leftEye = new THREE.Mesh(new THREE.SphereGeometry(.025, 8, 8), eyeMat);
      parts.rightEye = new THREE.Mesh(new THREE.SphereGeometry(.025, 8, 8), eyeMat);
      parts.leftEye.position.set(-.075, 2.5, -.248);
      parts.rightEye.position.set(.075, 2.5, -.248);
      group.add(parts.leftEye, parts.rightEye);

      const noseMat = new THREE.MeshStandardMaterial({ color: options.skin, roughness: .68 });
      parts.nose = new THREE.Mesh(new THREE.ConeGeometry(.035, .09, 8), noseMat);
      parts.nose.position.set(0, 2.455, -.27);
      parts.nose.rotation.x = Math.PI / 2;
      group.add(parts.nose);

      const makeLimb = (name, x, y, z, length, material, radius = .105) => {
        const limb = new THREE.Mesh(new THREE.CapsuleGeometry(radius, length, 10, 18), material);
        limb.position.set(x, y, z);
        limb.castShadow = true;
        limb.receiveShadow = true;
        group.add(limb);
        parts[name] = limb;
        return limb;
      };

      parts.lArm = makeLimb("lArm", -.52, 1.82, .02, .85, sleeveMat, .08);
      parts.rArm = makeLimb("rArm", .52, 1.82, .02, .85, sleeveMat, .08);
      parts.lArm.rotation.z = .55;
      parts.rArm.rotation.z = -.55;
      parts.lLeg = makeLimb("lLeg", -.22, .86, 0, 1.0, shortsMat, .11);
      parts.rLeg = makeLimb("rLeg", .22, .86, 0, 1.0, shortsMat, .11);
      parts.lSock = makeLimb("lSock", -.22, .32, .02, .45, sockMat, .08);
      parts.rSock = makeLimb("rSock", .22, .32, .02, .45, sockMat, .08);
      parts.lBoot = addBox([.22, .11, .38], [-.22, .08, -.04], bootMat, group);
      parts.rBoot = addBox([.22, .11, .38], [.22, .08, -.04], bootMat, group);
      if (options.role === "keeper") {
        parts.chestPanel = addBox([.46, .055, .405], [0, 1.94, -.205], trimMat, group);
        parts.chestPanel.rotation.x = .02;
        parts.lGlove = new THREE.Mesh(new THREE.SphereGeometry(.135, 18, 14), gloveMat);
        parts.rGlove = new THREE.Mesh(new THREE.SphereGeometry(.135, 18, 14), gloveMat);
        parts.lGlove.position.set(-.82, 1.48, -.03);
        parts.rGlove.position.set(.82, 1.48, -.03);
        parts.lGlove.castShadow = true;
        parts.rGlove.castShadow = true;
        group.add(parts.lGlove, parts.rGlove);

        const numberCanvas = document.createElement("canvas");
        numberCanvas.width = 128;
        numberCanvas.height = 128;
        const nctx = numberCanvas.getContext("2d");
        nctx.clearRect(0, 0, 128, 128);
        nctx.fillStyle = "#ffffff";
        nctx.font = "900 86px Microsoft JhengHei, sans-serif";
        nctx.textAlign = "center";
        nctx.textBaseline = "middle";
        nctx.fillText("1", 64, 68);
        const numberTexture = new THREE.CanvasTexture(numberCanvas);
        const number = new THREE.Mesh(
          new THREE.PlaneGeometry(.34, .34),
          new THREE.MeshBasicMaterial({ map: numberTexture, transparent: true })
        );
        number.position.set(0, 1.78, -.216);
        number.rotation.x = .02;
        group.add(number);
        parts.number = number;
      }
      group.userData.parts = parts;
      return group;
    }

    function prepareImportedModel(model, role) {
      model.traverse((child) => {
        if (!child.isMesh) return;
        child.castShadow = true;
        child.receiveShadow = true;
        if (child.material) {
          child.material = child.material.clone();
          child.material.roughness = .62;
          child.material.metalness = .04;
        }
      });
      model.scale.setScalar(role === "keeper" ? 1.08 : 1.02);
      model.position.set(0, 0, 0);
      model.rotation.set(0, 0, 0);
      return model;
    }

    function playBestAnimation(target, gltf, mode = "idle") {
      if (!gltf.animations || !gltf.animations.length) return;
      const mixer = new THREE.AnimationMixer(target.userData.importedModel);
      const preferred = mode === "run"
        ? [/run/i, /walk/i, /idle/i]
        : [/idle/i, /stand/i, /walk/i];
      let clip = gltf.animations[0];
      for (const pattern of preferred) {
        const found = gltf.animations.find((item) => pattern.test(item.name));
        if (found) {
          clip = found;
          break;
        }
      }
      const action = mixer.clipAction(clip);
      action.play();
      target.userData.importedMixer = mixer;
      modelMixers.push(mixer);
    }

    async function installImportedPlayers() {
      try {
        const [{ GLTFLoader }, SkeletonUtils] = await Promise.all([
          import("https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"),
          import("https://unpkg.com/three@0.160.0/examples/jsm/utils/SkeletonUtils.js")
        ]);
        const gltfLoader = new GLTFLoader();
        const gltf = await gltfLoader.loadAsync(PLAYER_MODEL_URL);
        const strikerModel = prepareImportedModel(SkeletonUtils.clone(gltf.scene), "striker");
        const keeperModel = prepareImportedModel(SkeletonUtils.clone(gltf.scene), "keeper");

        striker.children.forEach((child) => { child.visible = false; });
        keeper.children.forEach((child) => { child.visible = false; });

        striker.userData.importedModel = strikerModel;
        keeper.userData.importedModel = keeperModel;
        striker.add(strikerModel);
        keeper.add(keeperModel);

        playBestAnimation(striker, gltf, "run");
        playBestAnimation(keeper, gltf, "idle");
        usingExternalModels = true;
      } catch (error) {
        console.warn("3D player model load failed, fallback character remains active.", error);
      }
    }

    function setPlayer(index) {
      state.playerIndex = index;
      const p = players[index];
      $("flagBox").textContent = p.country;
      $("playerName").textContent = `${p.country} ${p.name} 對戰 英格蘭 皮克福德`;
      document.querySelectorAll(".country-dock button").forEach((btn, i) => btn.classList.toggle("active", i === index));

      if (!usingExternalModels) {
        const next = buildPlayerModel(p);
        while (striker.children.length) striker.remove(striker.children[0]);
        next.children.slice().forEach((child) => striker.add(child));
        striker.userData.parts = next.userData.parts;
      }
      resetPose();
    }

    function buildCharacters() {
      striker = new THREE.Group();
      striker.position.set(0, 0, 5.5);
      striker.rotation.y = Math.PI;
      scene.add(striker);

      keeper = buildPlayerModel({ role: "keeper", kit: 0x182b44, shorts: 0x0b1626, skin: 0xb8754d });
      keeper.position.set(0, 0, -29.7);
      keeper.rotation.y = 0;
      keeper.scale.set(1.05, 1.05, 1.05);
      scene.add(keeper);

      ball = new THREE.Group();
      const sphere = new THREE.Mesh(new THREE.SphereGeometry(.24, 32, 22), mat.ball);
      sphere.castShadow = true;
      sphere.receiveShadow = true;
      ball.add(sphere);
      for (let i = 0; i < 6; i += 1) {
        const patch = new THREE.Mesh(new THREE.CircleGeometry(.055, 6), mat.ballDark);
        patch.position.set(Math.sin(i) * .18, Math.cos(i * 1.7) * .13, .238);
        patch.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        ball.add(patch);
      }
      scene.add(ball);

      const trailMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: .16 });
      for (let i = 0; i < 12; i += 1) {
        const dot = new THREE.Mesh(new THREE.SphereGeometry(.035 + i * .003, 10, 8), trailMat.clone());
        dot.visible = false;
        scene.add(dot);
        trail.push(dot);
      }
    }

    function resetPose() {
      striker.position.set(0, 0, 5.5);
      striker.rotation.set(0, Math.PI, 0);
      keeper.position.set(0, 0, -29.7);
      keeper.rotation.set(0, 0, 0);
      ball.position.set(0, .24, 1.0);
      ball.rotation.set(0, 0, 0);
      goal.userData.net.scale.set(1, 1, 1);
      trail.forEach((dot) => { dot.visible = false; dot.material.opacity = .16; });

      const p = striker.userData.parts || {};
      if (p.lArm) p.lArm.rotation.set(0, 0, .55);
      if (p.rArm) p.rArm.rotation.set(0, 0, -.55);
      if (p.lLeg) p.lLeg.rotation.set(0, 0, 0);
      if (p.rLeg) p.rLeg.rotation.set(0, 0, 0);
      const k = keeper.userData.parts || {};
      if (k.lArm) k.lArm.rotation.set(0, 0, .85);
      if (k.rArm) k.rArm.rotation.set(0, 0, -.85);
      if (k.lLeg) k.lLeg.rotation.set(0, 0, 0);
      if (k.rLeg) k.rLeg.rotation.set(0, 0, 0);
    }

    function renderCountries() {
      const dock = $("countryDock");
      dock.innerHTML = "";
      players.forEach((p, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = p.country;
        btn.title = p.country;
        btn.addEventListener("click", () => {
          if (!state.locked) setPlayer(i);
        });
        dock.appendChild(btn);
      });
    }

    function setButtons(disabled) {
      buttons.forEach((button) => {
        if (button.id === "resetBtn") return;
        button.disabled = disabled;
      });
    }

    function showResult(title, text, sticky = false) {
      clearTimeout(state.resultTimer);
      $("resultTitle").textContent = title;
      $("resultText").textContent = text;
      $("resultBox").classList.add("show");
      if (!sticky) {
        state.resultTimer = setTimeout(() => $("resultBox").classList.remove("show"), 2600);
      }
    }

    function updateScore() {
      const p = players[state.playerIndex];
      $("scoreText").textContent = `進 ${state.goals}｜未進 ${state.misses}`;
      $("hintText").textContent = `第 ${state.shots + 1} 球｜${p.country} ${p.name} 主罰`;
    }

    function chooseOutcome(zone) {
      const roll = Math.random();
      const aimX = zone === "left" ? -2.65 : zone === "right" ? 2.65 : (Math.random() - .5) * .7;
      const aimY = zone === "center" ? 1.45 : 2.18 + Math.random() * .42;
      const saveChance = zone === "center" ? .38 : .26;
      const missChance = zone === "center" ? .08 : .16;
      const saved = roll < saveChance;
      const miss = !saved && roll < saveChance + missChance;
      const goal = !saved && !miss;
      const keeperDive = saved
        ? zone
        : zone === "left"
          ? "right"
          : zone === "right"
            ? "left"
            : (Math.random() > .5 ? "left" : "right");
      const savePoint = { x: zone === "left" ? -2.45 : zone === "right" ? 2.45 : 0, y: zone === "center" ? 1.35 : 2.08, z: -29.35 };
      const deflectTarget = {
        x: savePoint.x + (zone === "left" ? -1.05 : zone === "right" ? 1.05 : .55),
        y: Math.max(.42, savePoint.y - .55),
        z: -27.7
      };
      const target = saved
        ? savePoint
        : miss
          ? { x: zone === "left" ? -4.6 : zone === "right" ? 4.6 : aimX, y: zone === "center" ? 3.95 : 3.45, z: -30.6 }
          : { x: aimX, y: aimY, z: -32.7 };
      return {
        zone,
        goal,
        saved,
        miss,
        keeperDive,
        target,
        savePoint,
        deflectTarget,
        impactFly: .62
      };
    }

    function kick(zone) {
      if (state.locked) return;
      clearTimeout(state.autoResetTimer);
      state.locked = true;
      setButtons(true);
      $("resultBox").classList.remove("show");
      resetPose();
      state.anim = {
        start: performance.now(),
        duration: 2100,
        outcome: chooseOutcome(zone),
        trailPoints: []
      };
    }

    function finishShot(outcome) {
      state.shots += 1;
      if (outcome.goal) state.goals += 1;
      else state.misses += 1;

      if (outcome.goal) {
        ball.position.set(outcome.target.x, outcome.target.y - .45, -32.85);
        const p = players[state.playerIndex];
        showResult("進球！", `皮球鑽進網內，${p.country} ${p.name} 冷靜命中。`);
      } else if (outcome.saved) {
        ball.position.set(outcome.deflectTarget.x, outcome.deflectTarget.y, outcome.deflectTarget.z);
        showResult("未進！", "守門員判斷正確，完成撲救。");
      } else {
        showResult("未進！", "射門力量過大，皮球飛出門框。");
      }

      setTimeout(() => resetPose(), 900);

      state.locked = false;
      state.anim = null;
      setButtons(false);
      updateScore();
    }

    function animate() {
      const dt = clock.getDelta();
      const t = clock.elapsedTime;
      modelMixers.forEach((mixer) => mixer.update(dt));

      const breathe = Math.sin(t * 1.6) * .018;
      camera.position.x = Math.sin(t * .25) * .24;
      camera.position.y = (innerWidth < 760 ? 4.85 : 4.7) + breathe;
      camera.lookAt(0, innerWidth < 760 ? 1.85 : 1.45, -24);

      if (!state.anim) {
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
        return;
      }

      const anim = state.anim;
      const outcome = anim.outcome;
      const p = Math.min(1, (performance.now() - anim.start) / anim.duration);
      const run = Math.min(1, p / .34);
      const swing = Math.max(0, Math.min(1, (p - .26) / .24));
      const fly = Math.max(0, Math.min(1, (p - .38) / .48));
      const settle = Math.max(0, (p - .88) / .12);

      striker.position.z = THREE.MathUtils.lerp(5.5, 1.25, run);
      striker.position.y = Math.sin(run * Math.PI * 7) * .035;
      const sp = striker.userData.parts || {};
      if (sp.rLeg) sp.rLeg.rotation.x = -Math.sin(swing * Math.PI) * 1.45;
      if (sp.lLeg) sp.lLeg.rotation.x = Math.sin(run * Math.PI * 5.5) * .28;
      if (sp.lArm) sp.lArm.rotation.z = .55 + Math.sin(run * Math.PI * 5) * .18;
      if (sp.rArm) sp.rArm.rotation.z = -.55 - Math.sin(swing * Math.PI) * .38;

      const dive = Math.max(0, (fly - .04) / .86);
      const diveX = outcome.keeperDive === "left" ? -2.7 : outcome.keeperDive === "right" ? 2.7 : 0;
      keeper.position.x = diveX * Math.min(1, dive);
      keeper.position.y = outcome.keeperDive === "center" ? 0 : Math.sin(Math.min(1, dive) * Math.PI) * .62;
      keeper.rotation.z = outcome.keeperDive === "left" ? .96 * dive : outcome.keeperDive === "right" ? -.96 * dive : 0;
      const kp = keeper.userData.parts || {};
      if (kp.lArm) kp.lArm.rotation.z = .85 + dive * .72;
      if (kp.rArm) kp.rArm.rotation.z = -.85 - dive * .72;
      if (outcome.saved && fly > outcome.impactFly - .05) {
        const block = Math.max(0, 1 - Math.abs(fly - outcome.impactFly) / .12);
        ball.scale.set(1 + block * .18, 1 - block * .12, 1 + block * .08);
      } else {
        ball.scale.set(1, 1, 1);
      }

      if (fly > 0) {
        if (outcome.saved) {
          const impact = outcome.impactFly;
          if (fly <= impact) {
            const e = 1 - Math.pow(1 - fly / impact, 3);
            const curve = outcome.zone === "left" ? -.18 : outcome.zone === "right" ? .18 : .03;
            ball.position.x = THREE.MathUtils.lerp(0, outcome.savePoint.x, e) + Math.sin((fly / impact) * Math.PI) * curve;
            ball.position.z = THREE.MathUtils.lerp(1.0, outcome.savePoint.z, e);
            ball.position.y = THREE.MathUtils.lerp(.24, outcome.savePoint.y, e) + Math.sin((fly / impact) * Math.PI) * .9;
          } else {
            const e = 1 - Math.pow(1 - (fly - impact) / (1 - impact), 2);
            ball.position.x = THREE.MathUtils.lerp(outcome.savePoint.x, outcome.deflectTarget.x, e);
            ball.position.z = THREE.MathUtils.lerp(outcome.savePoint.z, outcome.deflectTarget.z, e);
            ball.position.y = THREE.MathUtils.lerp(outcome.savePoint.y, outcome.deflectTarget.y, e) + Math.sin(e * Math.PI) * .22;
          }
        } else {
          const e = 1 - Math.pow(1 - fly, 3);
          const curve = outcome.zone === "left" ? -.28 : outcome.zone === "right" ? .28 : .06;
          ball.position.x = THREE.MathUtils.lerp(0, outcome.target.x, e) + Math.sin(fly * Math.PI) * curve;
          ball.position.z = THREE.MathUtils.lerp(1.0, outcome.target.z, e);
          ball.position.y = THREE.MathUtils.lerp(.24, outcome.target.y, e) + Math.sin(fly * Math.PI) * (outcome.goal ? 1.08 : 1.48);
        }
        ball.rotation.x += .52;
        ball.rotation.y += outcome.zone === "left" ? -.35 : .35;
        anim.trailPoints.unshift(ball.position.clone());
        anim.trailPoints.length = Math.min(anim.trailPoints.length, trail.length);
        trail.forEach((dot, i) => {
          if (!anim.trailPoints[i]) return;
          dot.position.copy(anim.trailPoints[i]);
          dot.visible = true;
          dot.material.opacity = Math.max(.02, .18 - i * .012);
        });
      }

      if (outcome.goal && fly > .82) {
        const pulse = Math.sin((fly - .82) / .18 * Math.PI);
        goal.userData.net.scale.z = 1 + pulse * .22;
      }

      if (settle >= 1) finishShot(outcome);

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function resetGame() {
      state.goals = 0;
      state.misses = 0;
      state.shots = 0;
      state.locked = false;
      state.anim = null;
      clearTimeout(state.autoResetTimer);
      setButtons(false);
      setPlayer(state.playerIndex);
      resetPose();
      showResult("準備射門", "選擇方向後開始 12 碼。");
      updateScore();
    }

    function resize() {
      const w = innerWidth;
      const h = innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.position.z = w < 760 ? 22.4 : 18.5;
      camera.fov = w < 760 ? 60 : 48;
      camera.updateProjectionMatrix();
    }

    buildPitch();
    buildStadium();
    buildGoal();
    buildCharacters();
    renderCountries();
    setPlayer(0);
    resetGame();
    installImportedPlayers();

    document.querySelectorAll("[data-shot]").forEach((button) => {
      button.addEventListener("click", () => kick(button.dataset.shot));
    });
    $("nextBtn").addEventListener("click", () => {
      if (!state.locked) {
        state.goals = 0;
        state.misses = 0;
        state.shots = 0;
        setPlayer((state.playerIndex + 1) % players.length);
        updateScore();
      }
    });
    $("resetBtn").addEventListener("click", resetGame);
    addEventListener("resize", resize);
    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
