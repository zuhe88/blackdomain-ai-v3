<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>世足 12碼點球</title>
  <style>
    :root {
      --gold: #d9b66a;
      --gold2: #f4dc9a;
      --text: #f8fafc;
      --muted: rgba(248,250,252,.68);
      --glass: rgba(8,12,16,.58);
      --line: rgba(255,255,255,.16);
      --green: #27d17f;
      --red: #ff4f59;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #050607;
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    }

    #scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #050607;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 52%, transparent 0 45%, rgba(0,0,0,.44) 78%, rgba(0,0,0,.76) 100%),
        linear-gradient(180deg, rgba(0,0,0,.28), transparent 28%, rgba(0,0,0,.34));
      z-index: 2;
    }

    .hud {
      position: fixed;
      z-index: 5;
      left: max(18px, env(safe-area-inset-left));
      right: max(18px, env(safe-area-inset-right));
      top: max(16px, env(safe-area-inset-top));
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 14px;
      pointer-events: none;
    }

    .title-panel,
    .score-panel,
    .player-panel,
    .result-panel,
    .controls,
    .country-dock {
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(8,12,16,.72), rgba(8,12,16,.44));
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 54px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.08);
      border-radius: 22px;
    }

    .title-panel {
      padding: 14px 16px;
      min-width: 0;
    }

    .eyebrow {
      color: var(--gold2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .18em;
      text-shadow: 0 0 16px rgba(217,182,106,.25);
    }

    h1 {
      margin: 4px 0 0;
      font-size: clamp(24px, 5vw, 44px);
      line-height: 1;
      letter-spacing: .04em;
      text-shadow: 0 8px 24px rgba(0,0,0,.46);
    }

    .score-panel {
      min-width: 132px;
      padding: 12px 14px;
      text-align: center;
    }

    .score-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .score {
      margin-top: 2px;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 900;
      letter-spacing: .12em;
      color: #fff;
    }

    .player-panel {
      position: fixed;
      z-index: 5;
      left: max(18px, env(safe-area-inset-left));
      bottom: calc(124px + env(safe-area-inset-bottom));
      width: min(360px, calc(100vw - 36px));
      padding: 12px;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      color: #101010;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.55), transparent 24%),
        linear-gradient(135deg, #ffe7a5, #9c6a1e);
      box-shadow: 0 0 34px rgba(217,182,106,.26);
    }

    .player-name {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.15;
    }

    .player-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .country-dock {
      position: fixed;
      z-index: 5;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      width: min(720px, calc(100vw - 28px));
      transform: translateX(-50%);
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .country {
      border: 1px solid rgba(255,255,255,.14);
      color: var(--text);
      background: rgba(255,255,255,.06);
      min-height: 58px;
      border-radius: 16px;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 2px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .country.active {
      border-color: rgba(244,220,154,.9);
      background: linear-gradient(180deg, rgba(217,182,106,.26), rgba(255,255,255,.07));
      transform: translateY(-3px);
    }

    .flag { font-size: 23px; line-height: 1; }
    .country-name { font-size: 12px; font-weight: 900; }

    .controls {
      position: fixed;
      z-index: 6;
      right: max(18px, env(safe-area-inset-right));
      bottom: calc(124px + env(safe-area-inset-bottom));
      width: min(330px, calc(100vw - 36px));
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .shoot {
      border: 1px solid rgba(244,220,154,.5);
      border-radius: 16px;
      min-height: 52px;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      background:
        radial-gradient(circle at 50% 0%, rgba(244,220,154,.22), transparent 60%),
        linear-gradient(180deg, rgba(22,24,24,.84), rgba(8,10,11,.92));
      box-shadow: 0 12px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
      cursor: pointer;
    }

    .shoot:disabled {
      opacity: .48;
      cursor: wait;
    }

    .result-panel {
      position: fixed;
      z-index: 6;
      left: 50%;
      bottom: calc(206px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(460px, calc(100vw - 36px));
      padding: 13px 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.45;
    }

    .result-panel small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .mini-actions {
      position: fixed;
      z-index: 6;
      top: max(112px, calc(88px + env(safe-area-inset-top)));
      right: max(18px, env(safe-area-inset-right));
      display: flex;
      gap: 8px;
    }

    .mini {
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.38);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      font-weight: 800;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 50% 38%, rgba(255,255,255,.5), transparent 32%);
      transition: opacity .28s ease;
    }

    .flash.show { opacity: 1; }

    @media (max-width: 760px) {
      .hud { grid-template-columns: 1fr; }
      .score-panel { justify-self: end; margin-top: -6px; }
      .player-panel {
        bottom: calc(154px + env(safe-area-inset-bottom));
        width: min(330px, calc(100vw - 28px));
      }
      .controls {
        left: 50%;
        right: auto;
        bottom: calc(92px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        width: min(420px, calc(100vw - 28px));
      }
      .country-dock {
        grid-template-columns: repeat(3, 1fr);
      }
      .result-panel {
        bottom: calc(238px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="flash" id="flash"></div>
  <div class="vignette"></div>

  <header class="hud">
    <div class="title-panel">
      <div class="eyebrow">WORLD CUP STADIUM</div>
      <h1>世足 12碼點球</h1>
    </div>
    <div class="score-panel">
      <div class="score-label">五球決勝</div>
      <div class="score"><span id="scoreUs">0</span> : <span id="scoreCpu">0</span></div>
    </div>
  </header>

  <div class="mini-actions">
    <button class="mini" id="resetBtn">重新開始</button>
    <button class="mini" id="randomBtn">隨機名將</button>
  </div>

  <section class="result-panel" id="resultText">
    選擇名將，點擊射門方向。
    <small>球場看板已啟用，準備開踢。</small>
  </section>

  <section class="player-panel">
    <div class="avatar" id="avatar">梅</div>
    <div>
      <div class="player-name" id="playerName">梅西</div>
      <div class="player-meta" id="playerMeta">阿根廷名將｜左腳精準、冷靜推射</div>
    </div>
  </section>

  <section class="controls">
    <button class="shoot" data-shot="left">左上角</button>
    <button class="shoot" data-shot="center">中路</button>
    <button class="shoot" data-shot="right">右下角</button>
  </section>

  <section class="country-dock" id="countryDock"></section>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const logo = new Image();
    logo.src = "./assets/3a-logo.png";

    const players = [
      { country: "阿根廷", flag: "🇦🇷", name: "梅西", initials: "梅", meta: "左腳精準、冷靜推射", kit: ["#8fd5ff", "#ffffff"], skin: "#c98d62", power: 86 },
      { country: "法國", flag: "🇫🇷", name: "姆巴佩", initials: "姆", meta: "爆發速度、右腳重砲", kit: ["#143aad", "#e43b45"], skin: "#8e5a37", power: 88 },
      { country: "葡萄牙", flag: "🇵🇹", name: "C羅", initials: "羅", meta: "強力抽射、心理素質", kit: ["#c7232c", "#138a4a"], skin: "#c8845a", power: 90 },
      { country: "巴西", flag: "🇧🇷", name: "內馬爾", initials: "內", meta: "節奏變化、刁鑽角度", kit: ["#ffe34f", "#20a85d"], skin: "#b8784e", power: 85 },
      { country: "英格蘭", flag: "🏴", name: "凱恩", initials: "凱", meta: "穩定助跑、低角度射門", kit: ["#ffffff", "#d8d8d8"], skin: "#d19b75", power: 87 },
      { country: "西班牙", flag: "🇪🇸", name: "莫拉塔", initials: "莫", meta: "禁區嗅覺、節奏停頓", kit: ["#d71920", "#f6c343"], skin: "#c48964", power: 81 }
    ];

    const zones = ["left", "center", "right"];
    const zoneLabel = { left: "左路", center: "中路", right: "右路" };
    const $ = (id) => document.getElementById(id);
    const state = {
      player: players[0],
      shot: 0,
      goals: 0,
      cpu: 0,
      locked: false,
      keeper: "center",
      keeperPose: 0,
      strikerPose: 0,
      runup: 0,
      legSwing: 0,
      cameraShake: 0,
      netRipple: { x: .5, y: .5, power: 0 },
      ball: { x: .5, y: .83, z: 0, active: false, spin: 0, squash: 0 },
      trail: [],
      resultGlow: 0,
      clock: 0
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function pitchPoint(x, y) {
      const w = innerWidth;
      const h = innerHeight;
      const horizon = h * .34;
      const bottom = h * 1.03;
      const widthTop = w * .42;
      const widthBottom = w * 1.22;
      const py = lerp(horizon, bottom, y);
      const half = lerp(widthTop, widthBottom, y) / 2;
      return { x: w / 2 + (x - .5) * half * 2, y: py };
    }

    function drawStadium() {
      const w = innerWidth, h = innerHeight;
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, "#080b11");
      sky.addColorStop(.34, "#121821");
      sky.addColorStop(.35, "#17351f");
      sky.addColorStop(1, "#0a2615");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 7; i++) {
        const x = (i + .5) * w / 7;
        const g = ctx.createRadialGradient(x, h * .14, 0, x, h * .16, w * .18);
        g.addColorStop(0, "rgba(255,255,230,.38)");
        g.addColorStop(.28, "rgba(244,220,154,.12)");
        g.addColorStop(1, "rgba(244,220,154,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h * .52);
      }

      ctx.fillStyle = "#0c1016";
      ctx.fillRect(0, h * .19, w, h * .17);
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < Math.ceil(w / 18); c++) {
          const sparkle = (c * 17 + r * 29 + Math.floor(state.clock * 2)) % 9;
          ctx.fillStyle = sparkle === 0 ? "rgba(244,220,154,.75)" : sparkle < 3 ? "rgba(105,205,255,.42)" : "rgba(255,255,255,.20)";
          ctx.beginPath();
          ctx.arc(c * 18 + (r % 2) * 8, h * .205 + r * 13, 1.3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawAdBoards() {
      const w = innerWidth, h = innerHeight;
      const boardY = h * .355;
      const boardH = Math.max(34, h * .045);
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.82)";
      ctx.fillRect(0, boardY, w, boardH);
      ctx.strokeStyle = "rgba(217,182,106,.55)";
      ctx.lineWidth = 1;
      ctx.strokeRect(0, boardY, w, boardH);

      const text = "3A娛樂城　首儲1000送1000　LINE:@893jrweh";
      const speed = (state.clock * 62) % 420;
      ctx.font = `900 ${Math.max(16, boardH * .46)}px Microsoft JhengHei`;
      ctx.textBaseline = "middle";
      for (let x = -speed; x < w + 420; x += 420) {
        if (logo.complete) {
          ctx.fillStyle = "rgba(255,255,255,.95)";
          ctx.roundRect(x + 12, boardY + 5, 96, boardH - 10, 8);
          ctx.fill();
          ctx.drawImage(logo, x + 18, boardY + 9, 84, boardH - 18);
        }
        ctx.fillStyle = "#fff0bc";
        ctx.shadowColor = "rgba(217,182,106,.55)";
        ctx.shadowBlur = 12;
        ctx.fillText(text, x + 122, boardY + boardH / 2);
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    function drawPitch() {
      const w = innerWidth, h = innerHeight;
      const topL = pitchPoint(.07, 0), topR = pitchPoint(.93, 0), botR = pitchPoint(1.05, 1), botL = pitchPoint(-.05, 1);
      const grass = ctx.createLinearGradient(0, h * .35, 0, h);
      grass.addColorStop(0, "#124c2a");
      grass.addColorStop(.55, "#0d6a35");
      grass.addColorStop(1, "#08421f");
      ctx.fillStyle = grass;
      ctx.beginPath();
      ctx.moveTo(topL.x, topL.y);
      ctx.lineTo(topR.x, topR.y);
      ctx.lineTo(botR.x, botR.y);
      ctx.lineTo(botL.x, botL.y);
      ctx.closePath();
      ctx.fill();

      for (let i = 0; i < 10; i++) {
        const a = pitchPoint(i / 10, 0), b = pitchPoint(i / 10, 1);
        ctx.strokeStyle = i % 2 ? "rgba(255,255,255,.055)" : "rgba(0,0,0,.10)";
        ctx.lineWidth = w * .06;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,.72)";
      ctx.lineWidth = 2;
      const boxTopL = pitchPoint(.28, .18), boxTopR = pitchPoint(.72, .18), boxBotR = pitchPoint(.82, .53), boxBotL = pitchPoint(.18, .53);
      ctx.beginPath();
      ctx.moveTo(boxTopL.x, boxTopL.y);
      ctx.lineTo(boxTopR.x, boxTopR.y);
      ctx.lineTo(boxBotR.x, boxBotR.y);
      ctx.lineTo(boxBotL.x, boxBotL.y);
      ctx.closePath();
      ctx.stroke();

      const spot = pitchPoint(.5, .72);
      ctx.fillStyle = "rgba(255,255,255,.95)";
      ctx.beginPath();
      ctx.arc(spot.x, spot.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGoal() {
      const w = innerWidth, h = innerHeight;
      const cx = w / 2;
      const y = h * .405;
      const gw = Math.min(w * .54, 620);
      const gh = Math.min(h * .22, 190);
      ctx.save();
      ctx.translate(cx - gw / 2, y - gh);
      if (state.netRipple.power > .01) {
        const rx = state.netRipple.x * gw;
        const ry = state.netRipple.y * gh;
        const glow = ctx.createRadialGradient(rx, ry, 0, rx, ry, gw * .32);
        glow.addColorStop(0, `rgba(255,255,255,${.24 * state.netRipple.power})`);
        glow.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, gw, gh);
      }
      ctx.strokeStyle = "rgba(255,255,255,.92)";
      ctx.lineWidth = 6;
      ctx.strokeRect(0, 0, gw, gh);
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 1;
      for (let x = 18; x < gw; x += 24) {
        ctx.beginPath();
        for (let yy = 0; yy <= gh; yy += 12) {
          const ripple = state.netRipple.power * Math.sin((yy * .08) + state.clock * 18) * 8 * Math.max(0, 1 - Math.abs((x / gw) - state.netRipple.x) * 2.8);
          const px = x + ripple;
          if (yy === 0) ctx.moveTo(px, yy);
          else ctx.lineTo(px, yy);
        }
        ctx.stroke();
      }
      for (let yy = 18; yy < gh; yy += 24) {
        ctx.beginPath();
        for (let x = 0; x <= gw; x += 12) {
          const ripple = state.netRipple.power * Math.sin((x * .07) + state.clock * 18) * 7 * Math.max(0, 1 - Math.abs((yy / gh) - state.netRipple.y) * 2.8);
          const py = yy + ripple;
          if (x === 0) ctx.moveTo(x, py);
          else ctx.lineTo(x, py);
        }
        ctx.stroke();
      }
      ctx.restore();

      const sideY = h * .5;
      const adW = Math.min(180, w * .24);
      [["left", w * .13], ["right", w * .87 - adW]].forEach(([side, x]) => {
        ctx.save();
        ctx.translate(x, sideY);
        ctx.transform(1, 0, side === "left" ? -.14 : .14, 1, 0, 0);
        ctx.fillStyle = "rgba(0,0,0,.72)";
        ctx.strokeStyle = "rgba(217,182,106,.62)";
        ctx.lineWidth = 1;
        ctx.roundRect(0, 0, adW, 72, 12);
        ctx.fill(); ctx.stroke();
        if (logo.complete) {
          ctx.fillStyle = "rgba(255,255,255,.96)";
          ctx.roundRect(12, 9, adW - 24, 28, 7);
          ctx.fill();
          ctx.drawImage(logo, 18, 13, adW - 36, 20);
        }
        ctx.fillStyle = "#ffe9a9";
        ctx.font = "900 15px Microsoft JhengHei";
        ctx.textAlign = "center";
        ctx.fillText(side === "left" ? "首儲1000送1000" : "LINE:@893jrweh", adW / 2, 58);
        ctx.restore();
      });
    }

    function drawPlayer(x, y, scale, colors, skin, pose, isKeeper = false) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.rotate(isKeeper ? pose * .18 : pose * .035);
      const run = isKeeper ? 0 : state.runup;
      const swing = isKeeper ? 0 : state.legSwing;
      const keeperReach = isKeeper ? Math.abs(pose) : 0;

      ctx.fillStyle = "rgba(0,0,0,.28)";
      ctx.beginPath();
      ctx.ellipse(0, 84, 48, 11, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = colors[0];
      ctx.lineWidth = isKeeper ? 11 : 10;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-24, -28); ctx.lineTo(-54 - pose * 34 - keeperReach * 36, -4 + pose * 16);
      ctx.moveTo(24, -28); ctx.lineTo(54 + pose * 34 + keeperReach * 36, -4 - pose * 16);
      ctx.stroke();

      const shirt = ctx.createLinearGradient(-30, -40, 30, 28);
      shirt.addColorStop(0, colors[0]); shirt.addColorStop(1, colors[1]);
      ctx.fillStyle = shirt;
      ctx.beginPath();
      ctx.roundRect(-30, -50, 60, 72, 18);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,.16)";
      ctx.fillRect(-24, -28, 48, 4);

      ctx.fillStyle = "rgba(0,0,0,.34)";
      ctx.beginPath();
      ctx.roundRect(-24, 16, 48, 30, 8);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,.82)";
      ctx.font = "900 18px Microsoft JhengHei";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(isKeeper ? "1" : "10", 0, -14);

      ctx.fillStyle = skin;
      ctx.beginPath();
      ctx.arc(0 + pose * 4, -76, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.18)";
      ctx.beginPath();
      ctx.arc(-6 + pose * 4, -82, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,.52)";
      ctx.beginPath();
      ctx.arc(-6 + pose * 4, -76, 2, 0, Math.PI * 2);
      ctx.arc(7 + pose * 4, -76, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(0 + pose * 4, -86, 18, Math.PI, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = isKeeper ? "#7cffb5" : "#f2f2f2";
      ctx.lineWidth = 12;
      ctx.beginPath();
      if (isKeeper) {
        ctx.moveTo(-16, 18); ctx.lineTo(-36 - pose * 22, 70 - keeperReach * 12);
        ctx.moveTo(16, 18); ctx.lineTo(42 + pose * 18, 68 + keeperReach * 10);
      } else {
        ctx.moveTo(-16, 18); ctx.lineTo(-24 - run * 18, 70 - Math.sin(run * Math.PI) * 10);
        ctx.moveTo(16, 18); ctx.lineTo(24 + swing * 54, 70 - swing * 54);
      }
      ctx.stroke();

      ctx.fillStyle = "#0a0a0a";
      ctx.beginPath();
      if (isKeeper) {
        ctx.ellipse(-38 - pose * 24, 72 - keeperReach * 12, 16, 6, pose * .5, 0, Math.PI * 2);
        ctx.ellipse(44 + pose * 20, 70 + keeperReach * 10, 16, 6, pose * .5, 0, Math.PI * 2);
      } else {
        ctx.ellipse(-25 - run * 18, 74 - Math.sin(run * Math.PI) * 10, 15, 6, -.1, 0, Math.PI * 2);
        ctx.ellipse(28 + swing * 54, 74 - swing * 54, 15, 6, -.7, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.restore();
    }

    function drawBall() {
      const p = pitchPoint(state.ball.x, state.ball.y);
      const r = Math.max(8, 24 - state.ball.z * 11);
      ctx.save();
      ctx.globalAlpha = state.ball.active ? .96 : 1;
      for (let i = 0; i < state.trail.length; i++) {
        const t = state.trail[i];
        const tp = pitchPoint(t.x, t.y);
        const alpha = (i / state.trail.length) * .28;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = i > state.trail.length - 4 ? "#ffffff" : "rgba(255,255,255,.7)";
        ctx.beginPath();
        ctx.ellipse(tp.x, tp.y - t.z * 70, r * 1.4, r * .38, t.angle || 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + 16, r * 1.25, r * .35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.translate(p.x, p.y - state.ball.z * 70);
      ctx.rotate(state.ball.spin);
      ctx.scale(1 + state.ball.squash * .12, 1 - state.ball.squash * .08);
      ctx.fillStyle = "#f8f8f8";
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#111";
      ctx.beginPath();
      ctx.arc(0, 0, r * .34, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0,0,0,.75)";
      ctx.lineWidth = Math.max(1, r * .12);
      ctx.beginPath();
      ctx.arc(0, 0, r * .68, -.8, .8);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, r * .68, 2.35, 3.95);
      ctx.stroke();
      ctx.fill();
      ctx.restore();
    }

    function drawActors() {
      const keeperBase = pitchPoint(.5, .28);
      const dive = state.keeper === "left" ? -95 : state.keeper === "right" ? 95 : 0;
      drawPlayer(keeperBase.x + dive * state.keeperPose, keeperBase.y + 14 - Math.abs(dive) * .08 * state.keeperPose, .72, ["#30db87", "#0a6b42"], "#d6a27a", state.keeperPose * (state.keeper === "left" ? -1 : 1), true);
      const striker = pitchPoint(.5, .83);
      drawPlayer(striker.x, striker.y, .9, state.player.kit, state.player.skin, state.strikerPose, false);
    }

    function render() {
      state.clock += 1 / 60;
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      const shake = state.cameraShake;
      ctx.save();
      if (shake > .01) ctx.translate((Math.random() - .5) * shake * 10, (Math.random() - .5) * shake * 6);
      drawStadium();
      drawAdBoards();
      drawPitch();
      drawGoal();
      drawActors();
      drawBall();
      ctx.restore();
      state.cameraShake *= .9;
      state.netRipple.power *= .92;
      requestAnimationFrame(render);
    }

    function renderCountries() {
      const dock = $("countryDock");
      dock.innerHTML = "";
      players.forEach((p, index) => {
        const btn = document.createElement("button");
        btn.className = "country" + (p.name === state.player.name ? " active" : "");
        btn.innerHTML = `<span class="flag">${p.flag}</span><span class="country-name">${p.country}</span>`;
        btn.addEventListener("click", () => selectPlayer(index));
        dock.appendChild(btn);
      });
    }

    function selectPlayer(index) {
      if (state.locked) return;
      state.player = players[index];
      $("avatar").textContent = state.player.initials;
      $("playerName").textContent = state.player.name;
      $("playerMeta").textContent = `${state.player.country}名將｜${state.player.meta}`;
      renderCountries();
    }

    function updateScore() {
      $("scoreUs").textContent = state.goals;
      $("scoreCpu").textContent = state.cpu;
      document.querySelectorAll(".shoot").forEach((b) => b.disabled = state.locked || state.shot >= 5);
    }

    function resetBall() {
      state.ball = { x: .5, y: .83, z: 0, active: false };
      state.trail = [];
      state.keeper = "center";
      state.keeperPose = 0;
      state.strikerPose = 0;
      state.runup = 0;
      state.legSwing = 0;
      state.cameraShake = 0;
      state.netRipple = { x: .5, y: .5, power: 0 };
    }

    function setResult(title, sub = "") {
      $("resultText").innerHTML = `${title}${sub ? `<small>${sub}</small>` : ""}`;
    }

    function finishMatch() {
      if (state.goals > state.cpu) setResult("點球大戰勝利", "全場歡呼，名將完成致勝一擊。");
      else if (state.goals === state.cpu) setResult("雙方平手", "壓力還在，下一輪重新開始。");
      else setResult("守門員守住勝利", "調整角度，再挑戰一次。");
    }

    function shoot(zone) {
      if (state.locked || state.shot >= 5) return;
      state.locked = true;
      updateScore();
      setResult("助跑中...", "看準角度，準備起腳。");

      const keeper = zones[Math.floor(Math.random() * zones.length)];
      const quality = state.player.power + Math.floor(Math.random() * 18) - 9;
      const onTarget = quality >= 73 || zone === "center";
      const saved = onTarget && keeper === zone && Math.random() > .2;
      const goal = onTarget && !saved;
      const cpuGoal = Math.random() > .4;
      const goalX = zone === "left" ? .29 : zone === "right" ? .71 : .5;
      const goalY = zone === "center" ? .31 : .2;
      const missSide = zone === "left" ? -.08 : zone === "right" ? 1.08 : .5;
      const missHigh = zone === "center" ? .13 : .16;
      const saveX = keeper === "left" ? .24 : keeper === "right" ? .76 : .5;
      const saveY = keeper === "center" ? .38 : .26;
      const targetX = goal ? goalX : saved ? saveX : missSide;
      const targetY = goal ? goalY : saved ? saveY : missHigh;
      const start = performance.now();

      state.keeper = keeper;
      state.ball.active = true;
      state.trail = [];
      state.runup = 0;
      state.legSwing = 0;
      state.cameraShake = 0;
      state.netRipple = { x: goalX, y: goalY, power: 0 };

      function animate(now) {
        const elapsed = now - start;
        const runT = Math.min(1, elapsed / 360);
        const kickT = Math.min(1, Math.max(0, elapsed - 260) / 250);
        const flyT = Math.min(1, Math.max(0, elapsed - 440) / 760);
        const settleT = Math.min(1, Math.max(0, elapsed - 1120) / 340);
        const e = easeOutCubic(flyT);

        state.runup = Math.sin(runT * Math.PI * 2.8) * (1 - Math.min(1, kickT));
        state.legSwing = Math.sin(kickT * Math.PI) * 1.2;
        state.strikerPose = state.runup * .55 + state.legSwing * .9;
        state.keeperPose = easeOutCubic(Math.max(0, flyT - .16) / .84);

        if (flyT > 0) {
          const curve = zone === "left" ? -.035 : zone === "right" ? .035 : 0;
          const bend = Math.sin(flyT * Math.PI) * curve;
          state.ball.x = lerp(.5, targetX, e) + bend;
          state.ball.y = lerp(.83, targetY, e);
          state.ball.z = Math.sin(flyT * Math.PI) * (goal ? .92 : saved ? .68 : 1.05);
          state.ball.spin += (zone === "left" ? -1 : zone === "right" ? 1 : .65) * .48;
          state.ball.squash = Math.max(0, Math.sin(kickT * Math.PI)) * .7;
          state.cameraShake = Math.max(state.cameraShake, .22 * (1 - flyT));
        } else {
          state.ball.x = .5;
          state.ball.y = .83;
          state.ball.z = 0;
          state.ball.squash = Math.sin(kickT * Math.PI) * .8;
        }

        if (saved && flyT > .78) {
          const deflect = easeOutCubic((flyT - .78) / .22);
          state.ball.x += (keeper === "left" ? -.16 : keeper === "right" ? .16 : .04) * deflect;
          state.ball.y += .06 * deflect;
          state.ball.z *= (1 - .35 * deflect);
        }

        if (goal && flyT > .9) {
          state.netRipple.power = Math.max(state.netRipple.power, (flyT - .9) * 8);
          state.cameraShake = Math.max(state.cameraShake, .42 * (1 - settleT));
        }

        if (!goal && !saved && flyT > .88) {
          state.ball.z += .35 * ((flyT - .88) / .12);
        }

        if (flyT > 0) state.trail.push({ x: state.ball.x, y: state.ball.y, z: state.ball.z, angle: state.ball.spin });
        if (state.trail.length > 10) state.trail.shift();

        if (settleT < 1) requestAnimationFrame(animate);
        else {
          state.shot += 1;
          if (goal) state.goals += 1;
          if (cpuGoal) state.cpu += 1;
          const flash = $("flash");
          if (goal) {
            state.ball.x = goalX;
            state.ball.y = goalY + .035;
            state.ball.z = .12;
            state.netRipple.power = 1;
            flash.classList.add("show");
            setTimeout(() => flash.classList.remove("show"), 130);
            setResult("進球！球鑽進網內", `${state.player.name} 射向${zoneLabel[zone]}，皮球撞網彈回。`);
          } else if (saved) {
            setResult("未進！守門員撲出", `射向${zoneLabel[zone]}，門將撲${zoneLabel[keeper]}成功擋下。`);
          } else {
            setResult("未進！皮球飛出門框", zone === "center" ? "球速太高，直接越過橫樑。" : "角度太刁，擦著門柱外側飛出。");
          }
          if (state.shot >= 5) setTimeout(finishMatch, 900);
          state.locked = false;
          updateScore();
        }
      }
      requestAnimationFrame(animate);
    }

    function resetGame() {
      state.shot = 0;
      state.goals = 0;
      state.cpu = 0;
      state.locked = false;
      resetBall();
      setResult("選擇名將，點擊射門方向。", "球場看板已啟用，準備開踢。");
      updateScore();
    }

    document.querySelectorAll(".shoot").forEach((b) => b.addEventListener("click", () => shoot(b.dataset.shot)));
    $("resetBtn").addEventListener("click", resetGame);
    $("randomBtn").addEventListener("click", () => selectPlayer(Math.floor(Math.random() * players.length)));
    window.addEventListener("resize", resize);

    resize();
    selectPlayer(0);
    updateScore();
    render();
  </script>
</body>
</html>
