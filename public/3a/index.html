<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7f9">
  <meta name="description" content="3A-周賀官方品牌與社群入口。">
  <meta property="og:title" content="3A-周賀">
  <meta property="og:description" content="加入官方 LINE，掌握最新資訊與服務動態。">
  <meta property="og:type" content="website">
  <title>3A-周賀｜官方入口</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #102331;
      --muted: #60717d;
      --line: #dce4e9;
      --paper: #ffffff;
      --canvas: #f5f7f9;
      --cyan: #00bcd4;
      --blue: #087ecb;
      --line-green: #06c755;
      --shadow: 0 16px 40px rgba(26, 54, 71, 0.12);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; background: var(--canvas); }

    body {
      min-height: 100vh;
      margin: 0;
      padding: max(28px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
      color: var(--ink);
      background-color: var(--canvas);
      background-image:
        linear-gradient(rgba(16, 35, 49, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 35, 49, 0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 460px);
      overflow: hidden;
      background: var(--paper);
      border: 1px solid rgba(16, 35, 49, 0.08);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .brand {
      position: relative;
      padding: 42px 30px 30px;
      text-align: center;
    }

    .brand::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
    }

    h1 {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1.25;
      font-weight: 800;
    }

    .brand-rule {
      width: 42px;
      height: 3px;
      margin: 0 auto 18px;
      background: var(--cyan);
      border-radius: 2px;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 320px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .content {
      padding: 0 24px 26px;
    }

    .link-row,
    .share-button {
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .link-row {
      justify-content: space-between;
      padding: 0 18px;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .link-row + .link-row { margin-top: 10px; }
    .link-row strong { display: block; font-size: 16px; }
    .link-row small { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 500; }

    .link-row.primary {
      color: #ffffff;
      background: var(--line-green);
      border-color: var(--line-green);
      box-shadow: 0 10px 24px rgba(6, 199, 85, 0.2);
    }

    .link-row.primary small { color: rgba(255, 255, 255, 0.88); }

    .link-row.blackdomain { border-left: 4px solid var(--ink); }
    .link-row.group { border-left: 4px solid var(--blue); }
    .link-row.instagram { border-left: 4px solid #c13584; }

    .line-mark {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      display: grid;
      place-items: center;
      color: var(--line-green);
      background: #ffffff;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 900;
    }

    .arrow { margin-left: auto; font-size: 22px; }

    .section-label {
      margin: 24px 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .share-button {
      justify-content: space-between;
      padding: 0 15px;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .share-button {
      margin-top: 10px;
      text-align: left;
    }

    .link-row:hover,
    .share-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(26, 54, 71, 0.12);
    }

    .link-row:focus-visible,
    .share-button:focus-visible {
      outline: 3px solid rgba(8, 126, 203, 0.22);
      outline-offset: 3px;
    }

    footer {
      padding: 17px 24px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      background: #f9fbfc;
      border-top: 1px solid var(--line);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      z-index: 2;
      max-width: calc(100vw - 36px);
      padding: 11px 16px;
      color: #ffffff;
      background: var(--ink);
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transform: translate(-50%, 10px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 420px) {
      body { padding-inline: 12px; }
      .brand { padding: 36px 22px 26px; }
      .content { padding-inline: 18px; }
      h1 { font-size: 27px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <section class="brand" aria-labelledby="page-title">
      <h1 id="page-title">3A-周賀</h1>
      <div class="brand-rule" aria-hidden="true"></div>
      <p class="subtitle">官方品牌與社群入口<br>最新資訊與服務動態由此開始</p>
    </section>

    <section class="content" aria-label="官方連結">
      <a id="lineLink" class="link-row primary" href="https://line.me/ti/p/@893jrweh" rel="noopener noreferrer">
        <span class="line-mark" aria-hidden="true">LINE</span>
        <span>
          <strong>周賀 LINE</strong>
          <small>LINE：@893jrweh</small>
        </span>
        <span class="arrow" aria-hidden="true">›</span>
      </a>

      <p class="section-label">更多官方入口</p>
      <a class="link-row blackdomain" href="https://line.me/ti/p/@391wiftp" rel="noopener noreferrer">
        <span><strong>黑域AI</strong><small>AI 預測程式官方 LINE</small></span>
        <span class="arrow" aria-hidden="true">›</span>
      </a>
      <a class="link-row group" href="https://line.me/ti/g2/2LjVINFUKeXijuZMnbxXBBhP779jdIHuwvsCDQ?utm_source=invitation&amp;utm_medium=link_copy&amp;utm_campaign=default" rel="noopener noreferrer">
        <span><strong>黑域AI預測程式討論群</strong><small>加入 LINE 群組交流討論</small></span>
        <span class="arrow" aria-hidden="true">›</span>
      </a>
      <a class="link-row instagram" href="https://www.instagram.com/3azu.88?igsh=MXVzYmU2d2s1Y3c5bA%3D%3D&amp;utm_source=qr" rel="noopener noreferrer">
        <span><strong>Instagram</strong><small>@3azu.88</small></span>
        <span class="arrow" aria-hidden="true">›</span>
      </a>

      <button id="shareButton" class="share-button" type="button">
        <span>分享 3A-周賀</span>
        <span aria-hidden="true">↗</span>
      </button>
    </section>

    <footer>
      <span>3A-周賀</span>
      <span>官方入口</span>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script>
    (() => {
      const shareButton = document.getElementById("shareButton");
      const toast = document.getElementById("toast");
      let toastTimer;

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("show");
        toastTimer = window.setTimeout(() => toast.classList.remove("show"), 2200);
      }

      shareButton.addEventListener("click", async () => {
        const shareData = {
          title: "3A-周賀",
          text: "3A-周賀官方品牌與社群入口",
          url: window.location.href,
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
            return;
          }

          await navigator.clipboard.writeText(window.location.href);
          showToast("連結已複製");
        } catch (error) {
          if (error && error.name === "AbortError") return;
          showToast("請使用瀏覽器的分享功能");
        }
      });
    })();
  </script>
</body>
</html>
