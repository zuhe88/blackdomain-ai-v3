<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#03050a">
  <meta name="description" content="3A / 大老爺，最帥代理周賀官方品牌與社群入口。">
  <meta property="og:title" content="3A / 大老爺｜最帥代理・周賀">
  <meta property="og:description" content="周賀 LINE、黑域AI與官方社群入口。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/3a/zhouhe-character.webp">
  <title>3A / 大老爺｜最帥代理・周賀</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fafb;
      --ink-dark: #0b171d;
      --muted: #9cadb6;
      --line: rgba(255, 255, 255, 0.12);
      --panel: #0c171c;
      --panel-raised: #111f25;
      --cyan: #43c5d8;
      --gold: #d5bd78;
      --line-green: #06c755;
      --page: #03050a;
      --bg-black: #03050a;
      --bg-navy: #07101f;
      --neon-blue: #22d3ee;
      --neon-purple: #8b5cf6;
      --neon-indigo: #4f46e5;
      --soft-white: #eaf6ff;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      background: var(--page);
    }

    body {
      position: relative;
      isolation: isolate;
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      overflow-x: hidden;
      background: var(--bg-black);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    a, button { -webkit-tap-highlight-color: transparent; }

    /* Layered AI control-center background. */
    .tech-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 82% 22%, rgba(79, 70, 229, 0.16), transparent 34%),
        radial-gradient(circle at 14% 76%, rgba(34, 211, 238, 0.09), transparent 38%),
        linear-gradient(145deg, var(--bg-black) 0%, #050a13 42%, var(--bg-navy) 100%);
    }

    .tech-grid {
      position: absolute;
      inset: -12%;
      opacity: 0.08;
      background-image:
        repeating-linear-gradient(60deg, rgba(34, 211, 238, 0.42) 0 1px, transparent 1px 58px),
        repeating-linear-gradient(120deg, rgba(139, 92, 246, 0.34) 0 1px, transparent 1px 58px);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 12%, transparent 76%);
      mask-image: radial-gradient(ellipse at center, #000 12%, transparent 76%);
    }

    .edge-glow {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 180px;
      opacity: 0.36;
      filter: blur(54px);
      animation: glowBreath 12s ease-in-out infinite;
    }

    .edge-glow.top {
      top: -132px;
      background: rgba(79, 70, 229, 0.32);
    }

    .edge-glow.bottom {
      bottom: -148px;
      background: rgba(34, 211, 238, 0.2);
      animation-delay: -6s;
    }

    .hud-ring {
      position: absolute;
      width: 430px;
      aspect-ratio: 1;
      border: 1px solid rgba(34, 211, 238, 0.13);
      border-radius: 50%;
      opacity: 0.72;
      animation: hudRotate 20s linear infinite;
    }

    .hud-ring::before,
    .hud-ring::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }

    .hud-ring::before {
      inset: 11%;
      border: 1px dashed rgba(139, 92, 246, 0.16);
    }

    .hud-ring::after {
      inset: 28%;
      border: 1px solid rgba(34, 211, 238, 0.1);
      box-shadow: 0 -108px 0 -107px rgba(234, 246, 255, 0.48), 0 108px 0 -107px rgba(139, 92, 246, 0.46);
    }

    .hud-left { left: -270px; top: 16%; }
    .hud-right { right: -230px; top: 43%; animation-direction: reverse; }

    .data-stream {
      position: absolute;
      width: min(34vw, 480px);
      height: 70px;
      opacity: 0.12;
      overflow: hidden;
    }

    .data-stream.left { left: 4%; top: 35%; }
    .data-stream.right { right: 4%; top: 19%; transform: scaleX(-1); }

    .data-stream span {
      display: block;
      width: 72%;
      height: 1px;
      margin: 14px 0;
      background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
      animation: dataDrift 14s ease-in-out infinite;
    }

    .data-stream span:nth-child(2) { width: 46%; animation-delay: -5s; }
    .data-stream span:nth-child(3) { width: 88%; animation-delay: -9s; }

    .particle-layer {
      position: absolute;
      inset: 0;
    }

    .particle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      color: var(--color, var(--neon-blue));
      background: var(--color, var(--neon-blue));
      opacity: var(--alpha, 0.38);
      box-shadow: 0 0 14px currentColor;
      animation: particleFloat var(--duration, 14s) ease-in-out var(--delay, 0s) infinite alternate;
    }

    .digital-floor {
      position: absolute;
      left: -16%;
      right: -16%;
      bottom: -120px;
      height: 300px;
      opacity: 0.1;
      transform: perspective(440px) rotateX(66deg);
      transform-origin: center bottom;
      background-image:
        repeating-linear-gradient(90deg, rgba(34, 211, 238, 0.5) 0 1px, transparent 1px 76px),
        repeating-linear-gradient(0deg, rgba(139, 92, 246, 0.42) 0 1px, transparent 1px 54px);
      animation: floorFlow 18s linear infinite;
    }

    .tech-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 45% 40%, rgba(3, 5, 10, 0.42) 0%, rgba(3, 5, 10, 0.12) 40%, rgba(3, 5, 10, 0.62) 100%),
        linear-gradient(90deg, rgba(3, 5, 10, 0.52), transparent 32%, transparent 72%, rgba(3, 5, 10, 0.42));
    }

    @keyframes particleFloat {
      from { transform: translate3d(0, 10px, 0); }
      to { transform: translate3d(8px, -22px, 0); }
    }

    @keyframes dataDrift {
      0%, 100% { transform: translateX(-14%); opacity: 0.45; }
      50% { transform: translateX(42%); opacity: 1; }
    }

    @keyframes hudRotate { to { transform: rotate(360deg); } }

    @keyframes glowBreath {
      0%, 100% { opacity: 0.24; transform: scaleX(0.92); }
      50% { opacity: 0.42; transform: scaleX(1.04); }
    }

    @keyframes floorFlow {
      to { background-position: 76px 54px, 76px 54px; }
    }

    .hero {
      position: relative;
      z-index: 2;
      min-height: min(76svh, 760px);
      isolation: isolate;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: transparent;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 38% 52%, rgba(3, 5, 10, 0.94) 0%, rgba(3, 5, 10, 0.7) 38%, rgba(3, 5, 10, 0.18) 74%);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      z-index: 1;
      height: 38%;
      background: linear-gradient(0deg, rgba(3, 5, 10, 0.94), transparent);
    }

    .character-aura {
      position: absolute;
      right: clamp(38px, 7vw, 118px);
      bottom: 5%;
      z-index: 2;
      width: clamp(310px, 34vw, 510px);
      height: 76%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(34, 211, 238, 0.15) 0%, rgba(79, 70, 229, 0.08) 40%, transparent 72%);
      filter: blur(10px);
      animation: auraPulse 10s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes auraPulse {
      0%, 100% { opacity: 0.72; transform: scale(0.97); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    .hero-character {
      position: absolute;
      right: clamp(34px, 8vw, 132px);
      bottom: -8px;
      z-index: 3;
      width: clamp(300px, 31vw, 470px);
      height: min(90%, 690px);
      margin: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
    }

    .hero-character img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.48)) drop-shadow(0 0 22px rgba(67, 197, 216, 0.12));
    }

    .topbar {
      position: absolute;
      inset: max(20px, env(safe-area-inset-top)) 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1180px, calc(100% - 48px));
      margin: auto;
      font-size: 13px;
      z-index: 4;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
    }

    .official-mark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.72);
    }

    .official-mark::before {
      content: "";
      width: 7px;
      height: 7px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 16px rgba(67, 197, 216, 0.85);
    }

    .hero-inner {
      position: relative;
      z-index: 4;
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 130px 0 74px;
    }

    .hero-content { max-width: min(660px, 58vw); }

    .system-row {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .system-badge {
      padding: 6px 9px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #8fe2ed;
      background: rgba(7, 16, 20, 0.62);
      border: 1px solid rgba(67, 197, 216, 0.28);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .system-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      flex: 0 0 6px;
      border-radius: 50%;
      background: var(--neon-blue);
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.9);
    }

    .eyebrow {
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ffe08a;
      background: linear-gradient(180deg, #fff2c7 0%, #ffe08a 30%, #ffc94a 65%, #d99a00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(255, 214, 107, 0.18), 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: #d5ad51;
    }

    h1 {
      max-width: 780px;
      margin: 0;
      font-weight: 800;
    }

    .title-prefix,
    .title-main,
    .title-name { display: block; }

    .title-prefix {
      margin-bottom: 8px;
      color: #b9c3cf;
      font-size: clamp(18px, 2.2vw, 27px);
      line-height: 1.2;
      font-weight: 600;
    }

    .title-main {
      color: #f3f6fa;
      font-size: clamp(26px, 3.9vw, 49px);
      line-height: 1.08;
      font-weight: 700;
    }

    .title-name {
      margin-top: 10px;
      padding-bottom: 8px;
      color: #f6f8fb;
      background: linear-gradient(180deg, #ffffff 0%, #f6f8fb 55%, #e4ebf5 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: clamp(66px, 10.3vw, 130px);
      line-height: 0.98;
      font-weight: 900;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.08), 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .hero-copy {
      max-width: 540px;
      margin: 24px 0 0;
      color: #9aa6b5;
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.8;
      font-weight: 500;
    }

    .hero-copy strong { color: inherit; font-weight: inherit; }

    .hero-actions {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hero-line,
    .hero-more {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
      border-radius: 7px;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      transition: transform 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
    }

    .hero-line {
      background: var(--line-green);
      box-shadow: 0 12px 30px rgba(6, 199, 85, 0.22);
    }

    .hero-more {
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(8, 17, 21, 0.58);
      backdrop-filter: blur(12px);
    }

    .hero-line:hover,
    .hero-more:hover { transform: translateY(-2px); }

    .links-section {
      position: relative;
      z-index: 2;
      padding: 78px 24px 92px;
      overflow: hidden;
      background: rgba(3, 8, 14, 0.84);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
    }

    .links-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: min(1180px, calc(100% - 48px));
      height: 1px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .links-inner {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .section-head { margin-bottom: 24px; }

    .section-kicker {
      margin: 0 0 10px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .link-card {
      position: relative;
      min-height: 148px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background-color 180ms ease;
    }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent, var(--cyan));
    }

    .link-card:hover {
      transform: translateY(-4px);
      background: var(--panel-raised);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .link-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--accent, var(--cyan));
      font-size: 12px;
      font-weight: 800;
    }

    .link-title {
      margin: 18px 0 5px;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 800;
    }

    .link-description {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .line-card { --accent: var(--line-green); grid-column: span 2; min-height: 176px; }
    .blackdomain-card { --accent: var(--gold); }
    .group-card { --accent: var(--cyan); }
    .instagram-card { --accent: #e35c9b; }

    .share-card {
      --accent: #d8e1e6;
      border: 1px solid var(--line);
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .bottom-row {
      margin-top: 52px;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #71848e;
      border-top: 1px solid var(--line);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      z-index: 10;
      max-width: calc(100vw - 36px);
      padding: 11px 16px;
      color: #ffffff;
      background: #15252c;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transform: translate(-50%, 10px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    :focus-visible {
      outline: 3px solid rgba(67, 197, 216, 0.4);
      outline-offset: 3px;
    }

    @media (max-width: 720px) {
      .tech-background {
        background:
          radial-gradient(circle at 84% 18%, rgba(79, 70, 229, 0.14), transparent 30%),
          radial-gradient(circle at 18% 45%, rgba(34, 211, 238, 0.07), transparent 36%),
          linear-gradient(155deg, var(--bg-black), var(--bg-navy));
      }

      .tech-grid {
        inset: -6%;
        opacity: 0.045;
        background-image:
          repeating-linear-gradient(60deg, rgba(34, 211, 238, 0.38) 0 1px, transparent 1px 72px),
          repeating-linear-gradient(120deg, rgba(139, 92, 246, 0.28) 0 1px, transparent 1px 72px);
        -webkit-mask-image: linear-gradient(#000 0 42%, transparent 78%);
        mask-image: linear-gradient(#000 0 42%, transparent 78%);
      }

      .hud-left,
      .data-stream.left,
      .particle:nth-child(n+7),
      .digital-floor { display: none; }

      .hud-right {
        width: 260px;
        right: -178px;
        top: 16%;
        opacity: 0.4;
      }

      .data-stream.right {
        top: 11%;
        right: -8%;
        width: 52vw;
        opacity: 0.07;
      }

      .edge-glow { height: 110px; opacity: 0.22; }
      .edge-glow.top { top: -88px; }
      .edge-glow.bottom { display: none; }

      .hero {
        min-height: 68svh;
      }

      .hero::before {
        background: radial-gradient(ellipse at 38% 48%, rgba(3, 5, 10, 0.96) 0%, rgba(3, 5, 10, 0.66) 52%, rgba(3, 5, 10, 0.18) 100%);
      }

      .character-aura {
        top: 126px;
        right: -8px;
        bottom: auto;
        width: 188px;
        height: 290px;
        opacity: 0.78;
        filter: blur(8px);
      }

      .hero-character {
        top: 150px;
        right: 8px;
        bottom: auto;
        width: 160px;
        height: 240px;
        opacity: 1;
      }

      .topbar,
      .hero-inner { width: calc(100% - 36px); }

      .hero-content { max-width: 100%; }

      .hero-inner { padding: 120px 0 44px; }
      .title-prefix { font-size: 17px; }
      .title-main { font-size: clamp(25px, 6.8vw, 32px); }
      .title-name { font-size: clamp(68px, 20vw, 90px); }
      .hero-copy { margin-top: 18px; font-size: 15px; }
      .hero-actions { margin-top: 24px; }
      .hero-line, .hero-more { min-height: 48px; padding: 0 16px; font-size: 14px; }

      .links-section { padding: 54px 18px 62px; }
      .links-section::before { width: calc(100% - 36px); }
      .section-head { margin-bottom: 20px; }
      .link-grid { grid-template-columns: 1fr; }
      .line-card { grid-column: auto; }
      .link-card { min-height: 132px; padding: 21px; }
      .line-card { min-height: 148px; }
      .link-title { font-size: 20px; }
    }

    @media (max-width: 390px) {
      .official-mark { font-size: 11px; }
      .character-aura { right: -20px; width: 176px; }
      .hero-actions { align-items: stretch; flex-direction: column; }
      .hero-line, .hero-more { width: 100%; }
      .bottom-row { align-items: flex-start; flex-direction: column; gap: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="tech-background" aria-hidden="true">
    <div class="tech-grid"></div>
    <div class="edge-glow top"></div>
    <div class="edge-glow bottom"></div>
    <div class="hud-ring hud-left"></div>
    <div class="hud-ring hud-right"></div>
    <div class="data-stream left"><span></span><span></span><span></span></div>
    <div class="data-stream right"><span></span><span></span><span></span></div>
    <div class="particle-layer">
      <i class="particle" style="--x:8%;--y:18%;--size:3px;--duration:13s;--delay:-4s"></i>
      <i class="particle" style="--x:18%;--y:72%;--size:2px;--duration:17s;--delay:-9s;--color:#8b5cf6"></i>
      <i class="particle" style="--x:31%;--y:26%;--size:2px;--duration:15s;--delay:-2s"></i>
      <i class="particle" style="--x:44%;--y:82%;--size:3px;--duration:18s;--delay:-12s;--color:#8b5cf6"></i>
      <i class="particle" style="--x:57%;--y:13%;--size:2px;--duration:14s;--delay:-7s"></i>
      <i class="particle" style="--x:68%;--y:64%;--size:3px;--duration:19s;--delay:-5s;--color:#4f46e5"></i>
      <i class="particle" style="--x:76%;--y:34%;--size:2px;--duration:16s;--delay:-11s"></i>
      <i class="particle" style="--x:86%;--y:78%;--size:3px;--duration:18s;--delay:-3s;--color:#8b5cf6"></i>
      <i class="particle" style="--x:92%;--y:16%;--size:2px;--duration:12s;--delay:-6s"></i>
      <i class="particle" style="--x:13%;--y:48%;--size:2px;--duration:20s;--delay:-14s"></i>
    </div>
    <div class="digital-floor"></div>
    <div class="tech-vignette"></div>
  </div>

  <header class="hero" id="top">
    <div class="topbar">
      <span class="wordmark">3A / 大老爺</span>
      <span class="official-mark">周賀系統在線</span>
    </div>

  <script>
    (() => {
      const shareButton = document.getElementById("shareButton");
      const toast = document.getElementById("toast");
      let toastTimer;

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("show");
        toastTimer = window.setTimeout(() => toast.classList.remove("show"), 2200);
      }

      shareButton.addEventListener("click", async () => {
        const shareData = {
          title: "3A / 大老爺｜最帥代理・周賀",
          text: "最帥代理周賀官方品牌與社群入口",
          url: window.location.href,
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
            return;
          }

          await navigator.clipboard.writeText(window.location.href);
          showToast("連結已複製");
        } catch (error) {
          if (error && error.name === "AbortError") return;
          showToast("請使用瀏覽器的分享功能");
        }
      });
    })();
  </script>
