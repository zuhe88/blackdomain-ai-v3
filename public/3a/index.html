<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071014">
  <meta name="description" content="3A-周賀官方品牌與社群入口。">
  <meta property="og:title" content="3A-周賀">
  <meta property="og:description" content="周賀 LINE、黑域AI與官方社群入口。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/3a/hero-architecture.webp">
  <title>3A-周賀｜官方入口</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fafb;
      --ink-dark: #0b171d;
      --muted: #9cadb6;
      --line: rgba(255, 255, 255, 0.12);
      --panel: #0c171c;
      --panel-raised: #111f25;
      --cyan: #43c5d8;
      --gold: #d5bd78;
      --line-green: #06c755;
      --page: #071014;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      background: var(--page);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: var(--page);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    a, button { -webkit-tap-highlight-color: transparent; }

    .hero {
      position: relative;
      min-height: min(76svh, 760px);
      isolation: isolate;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background-color: #0a1216;
      background-image: url("/3a/hero-architecture.webp");
      background-position: center;
      background-size: cover;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(4, 11, 14, 0.46);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      z-index: -1;
      height: 42%;
      background: rgba(4, 11, 14, 0.72);
    }

    .topbar {
      position: absolute;
      inset: max(20px, env(safe-area-inset-top)) 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1180px, calc(100% - 48px));
      margin: auto;
      font-size: 13px;
    }

    .wordmark {
      font-size: 18px;
      font-weight: 800;
    }

    .official-mark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.72);
    }

    .official-mark::before {
      content: "";
      width: 7px;
      height: 7px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 16px rgba(67, 197, 216, 0.85);
    }

    .hero-inner {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 130px 0 74px;
    }

    .eyebrow {
      margin: 0 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--gold);
    }

    h1 {
      max-width: 780px;
      margin: 0;
      font-size: clamp(52px, 8vw, 104px);
      line-height: 0.98;
      font-weight: 800;
    }

    .hero-copy {
      max-width: 540px;
      margin: 24px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.8;
    }

    .hero-actions {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hero-line,
    .hero-more {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
      border-radius: 7px;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      transition: transform 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
    }

    .hero-line {
      background: var(--line-green);
      box-shadow: 0 12px 30px rgba(6, 199, 85, 0.22);
    }

    .hero-more {
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(8, 17, 21, 0.58);
      backdrop-filter: blur(12px);
    }

    .hero-line:hover,
    .hero-more:hover { transform: translateY(-2px); }

    .links-section {
      position: relative;
      padding: 78px 24px 92px;
      overflow: hidden;
      background: var(--page);
    }

    .links-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: min(1180px, calc(100% - 48px));
      height: 1px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .links-inner {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .section-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 440px);
      gap: 48px;
      align-items: end;
      margin-bottom: 38px;
    }

    .section-kicker {
      margin: 0 0 10px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
    }

    h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.2;
    }

    .section-note {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .link-card {
      position: relative;
      min-height: 148px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background-color 180ms ease;
    }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent, var(--cyan));
    }

    .link-card:hover {
      transform: translateY(-4px);
      background: var(--panel-raised);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .link-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--accent, var(--cyan));
      font-size: 12px;
      font-weight: 800;
    }

    .link-title {
      margin: 18px 0 5px;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 800;
    }

    .link-description {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .line-card { --accent: var(--line-green); grid-column: span 2; min-height: 176px; }
    .blackdomain-card { --accent: var(--gold); }
    .group-card { --accent: var(--cyan); }
    .instagram-card { --accent: #e35c9b; }

    .share-card {
      --accent: #d8e1e6;
      border: 1px solid var(--line);
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .bottom-row {
      margin-top: 52px;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #71848e;
      border-top: 1px solid var(--line);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      z-index: 10;
      max-width: calc(100vw - 36px);
      padding: 11px 16px;
      color: #ffffff;
      background: #15252c;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transform: translate(-50%, 10px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    :focus-visible {
      outline: 3px solid rgba(67, 197, 216, 0.4);
      outline-offset: 3px;
    }

    @media (max-width: 720px) {
      .hero {
        min-height: 68svh;
        background-position: 67% center;
      }

      .topbar,
      .hero-inner { width: calc(100% - 36px); }

      .hero-inner { padding: 120px 0 44px; }
      h1 { font-size: clamp(48px, 15vw, 70px); }
      .hero-copy { margin-top: 18px; font-size: 15px; }
      .hero-actions { margin-top: 24px; }
      .hero-line, .hero-more { min-height: 48px; padding: 0 16px; font-size: 14px; }

      .links-section { padding: 54px 18px 62px; }
      .links-section::before { width: calc(100% - 36px); }
      .section-head { grid-template-columns: 1fr; gap: 18px; margin-bottom: 28px; }
      .link-grid { grid-template-columns: 1fr; }
      .line-card { grid-column: auto; }
      .link-card { min-height: 132px; padding: 21px; }
      .line-card { min-height: 148px; }
      .link-title { font-size: 20px; }
    }

    @media (max-width: 390px) {
      .official-mark { font-size: 11px; }
      .hero-actions { align-items: stretch; flex-direction: column; }
      .hero-line, .hero-more { width: 100%; }
      .bottom-row { align-items: flex-start; flex-direction: column; gap: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="hero" id="top">
    <div class="topbar">
      <span class="wordmark">3A-周賀</span>
      <span class="official-mark">官方社群入口</span>
    </div>

    <div class="hero-inner">
      <p class="eyebrow">唯一官方入口</p>
      <h1>3A-周賀</h1>
      <p class="hero-copy">周賀 LINE、黑域AI與官方社群資訊，集中於此頁面。</p>
      <div class="hero-actions">
        <a class="hero-line" href="https://line.me/ti/p/@893jrweh" rel="noopener noreferrer">
          <span>周賀 LINE</span>
          <span aria-hidden="true">↗</span>
        </a>
        <a class="hero-more" href="#official-links">查看全部入口</a>
      </div>
    </div>
  </header>

  <main class="links-section" id="official-links">
    <div class="links-inner">
      <div class="section-head">
        <div>
          <p class="section-kicker">官方連結</p>
          <h2>找到正確的入口</h2>
        </div>
        <p class="section-note">請由下方連結前往官方 LINE、黑域AI討論群與 Instagram。</p>
      </div>

      <div class="link-grid">
        <a class="link-card line-card" href="https://line.me/ti/p/@893jrweh" rel="noopener noreferrer">
          <div class="link-meta"><span>LINE 官方帳號</span><span aria-hidden="true">↗</span></div>
          <div>
            <h3 class="link-title">周賀 LINE</h3>
            <p class="link-description">LINE ID：@893jrweh</p>
          </div>
        </a>

        <a class="link-card blackdomain-card" href="https://line.me/ti/p/@391wiftp" rel="noopener noreferrer">
          <div class="link-meta"><span>官方 LINE</span><span aria-hidden="true">↗</span></div>
          <div>
            <h3 class="link-title">黑域AI</h3>
            <p class="link-description">AI 預測程式官方入口</p>
          </div>
        </a>

        <a class="link-card group-card" href="https://line.me/ti/g2/2LjVINFUKeXijuZMnbxXBBhP779jdIHuwvsCDQ?utm_source=invitation&amp;utm_medium=link_copy&amp;utm_campaign=default" rel="noopener noreferrer">
          <div class="link-meta"><span>LINE 群組</span><span aria-hidden="true">↗</span></div>
          <div>
            <h3 class="link-title">黑域AI討論群</h3>
            <p class="link-description">預測程式交流與資訊討論</p>
          </div>
        </a>

        <a class="link-card instagram-card" href="https://www.instagram.com/3azu.88?igsh=MXVzYmU2d2s1Y3c5bA%3D%3D&amp;utm_source=qr" rel="noopener noreferrer">
          <div class="link-meta"><span>社群動態</span><span aria-hidden="true">↗</span></div>
          <div>
            <h3 class="link-title">Instagram</h3>
            <p class="link-description">實戰影片</p>
          </div>
        </a>

        <button id="shareButton" class="link-card share-card" type="button">
          <div class="link-meta"><span>分享頁面</span><span aria-hidden="true">↗</span></div>
          <div>
            <h3 class="link-title">分享 3A-周賀</h3>
            <p class="link-description">傳送官方入口給朋友</p>
          </div>
        </button>
      </div>

      <footer class="bottom-row">
        <span>3A-周賀</span>
        <span>請認明本頁官方連結</span>
      </footer>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script>
    (() => {
      const shareButton = document.getElementById("shareButton");
      const toast = document.getElementById("toast");
      let toastTimer;

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("show");
        toastTimer = window.setTimeout(() => toast.classList.remove("show"), 2200);
      }

      shareButton.addEventListener("click", async () => {
        const shareData = {
          title: "3A-周賀",
          text: "3A-周賀官方品牌與社群入口",
          url: window.location.href,
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
            return;
          }

          await navigator.clipboard.writeText(window.location.href);
          showToast("連結已複製");
        } catch (error) {
          if (error && error.name === "AbortError") return;
          showToast("請使用瀏覽器的分享功能");
        }
      });
    })();
  </script>
</body>
</html>
